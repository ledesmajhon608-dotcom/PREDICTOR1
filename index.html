<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Predictor de Fútbol PRO</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

/* equipos */

.equipos{
display:flex;
justify-content:center;
align-items:center;
gap:30px;
flex-wrap:wrap;
}

.equipo{
display:flex;
flex-direction:column;
align-items:center;
}

.vs{
font-size:22px;
font-weight:bold;
margin-top:25px;
}

/* selects */

select{
padding:10px;
border-radius:8px;
border:none;
margin-top:5px;
}

/* boton */

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

/* card resultado */

.resultado{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:12px;
width:340px;
margin-left:auto;
margin-right:auto;
}

/* logos */

.teams{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.teams img{
width:40px;
}

/* barras */

.bar{
background:#334155;
height:10px;
border-radius:10px;
overflow:hidden;
margin-bottom:12px;
}

.fill{
background:#22c55e;
height:100%;
}

/* movil */

@media(max-width:600px){

.equipos{
flex-direction:column;
}

.vs{
margin:10px 0;
}

}

</style>
</head>

<body>

<h1>⚽ Predictor de Fútbol</h1>

<h3>Selecciona Liga</h3>

<select id="liga">

<option value="">-- Selecciona Liga --</option>
<option value="premier">Premier League</option>
<option value="laliga">La Liga</option>
<option value="seriea">Serie A</option>

</select>

<br><br>

<div class="equipos">

<div class="equipo">
<label>Equipo Local</label>
<select id="local"></select>
</div>

<div class="vs">VS</div>

<div class="equipo">
<label>Equipo Visitante</label>
<select id="visitante"></select>
</div>

</div>

<button onclick="calcular()">Calcular Predicción</button>

<div class="resultado" id="resultado"></div>

<script>

/* equipos */

const ligas={

premier:[
"Manchester City",
"Arsenal",
"Liverpool",
"Chelsea",
"Manchester United"
],

laliga:[
"Real Madrid",
"Barcelona",
"Atletico Madrid",
"Sevilla",
"Valencia"
],

seriea:[
"Inter",
"Milan",
"Juventus",
"Napoli",
"Roma"
]

};

/* logos */

const logos={

"Manchester City":"https://crests.football-data.org/65.png",
"Arsenal":"https://crests.football-data.org/57.png",
"Liverpool":"https://crests.football-data.org/64.png",
"Chelsea":"https://crests.football-data.org/61.png",
"Manchester United":"https://crests.football-data.org/66.png",

"Real Madrid":"https://crests.football-data.org/86.png",
"Barcelona":"https://crests.football-data.org/81.png",
"Atletico Madrid":"https://crests.football-data.org/78.png",
"Sevilla":"https://crests.football-data.org/559.png",
"Valencia":"https://crests.football-data.org/95.png",

"Inter":"https://crests.football-data.org/108.png",
"Milan":"https://crests.football-data.org/98.png",
"Juventus":"https://crests.football-data.org/109.png",
"Napoli":"https://crests.football-data.org/113.png",
"Roma":"https://crests.football-data.org/100.png"

};

/* selects */

const ligaSelect=document.getElementById("liga")
const localSelect=document.getElementById("local")
const visitanteSelect=document.getElementById("visitante")

ligaSelect.addEventListener("change",cargarEquipos)

function cargarEquipos(){

const liga=ligaSelect.value

localSelect.innerHTML=""
visitanteSelect.innerHTML=""

if(!ligas[liga]) return

ligas[liga].forEach(eq=>{

let op1=document.createElement("option")
op1.text=eq
op1.value=eq
localSelect.appendChild(op1)

let op2=document.createElement("option")
op2.text=eq
op2.value=eq
visitanteSelect.appendChild(op2)

})

}

/* calculo */

function calcular(){

const local=localSelect.value
const visitante=visitanteSelect.value

if(local==visitante){
alert("Selecciona equipos diferentes")
return
}

/* fuerza simple */

let fuerzaLocal=Math.random()*1.5+1
let fuerzaVisita=Math.random()*1.5+1

let total=fuerzaLocal+fuerzaVisita

let probLocal=((fuerzaLocal/total)*100).toFixed(1)
let probVisita=((fuerzaVisita/total)*100).toFixed(1)
let empate=(100-probLocal-probVisita).toFixed(1)

/* goles */

let goles=((fuerzaLocal+fuerzaVisita)/2+Math.random()).toFixed(2)

/* otros */

let ambos=(50+Math.random()*40).toFixed(0)
let corners=(7+Math.random()*5).toFixed(1)

/* resultado */

document.getElementById("resultado").innerHTML=`

<div class="teams">

<div>
<img src="${logos[local]}"><br>${local}
</div>

<strong>VS</strong>

<div>
<img src="${logos[visitante]}"><br>${visitante}
</div>

</div>

<p>Local ${probLocal}%</p>
<div class="bar"><div class="fill" style="width:${probLocal}%"></div></div>

<p>Empate ${empate}%</p>
<div class="bar"><div class="fill" style="width:${empate}%"></div></div>

<p>Visita ${probVisita}%</p>
<div class="bar"><div class="fill" style="width:${probVisita}%"></div></div>

<hr>

<p>⚽ Goles esperados: <b>${goles}</b></p>
<p>🔥 Ambos marcan: <b>${ambos}%</b></p>
<p>🚩 Corners estimados: <b>${corners}</b></p>

`

}

</script>

</body>
</html>
```
