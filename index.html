<script>
    const KEY = "ea232d851cb4197391464e2c61df516b"; 
    let db = {};

    document.getElementById("liga").onchange = async function() {
        const ligaId = this.value;
        if(!ligaId) return;

        const loc = document.getElementById("local");
        const vis = document.getElementById("visitante");
        loc.innerHTML = vis.innerHTML = "<option>Cargando equipos...</option>";

        // Buscamos desde 2026 hacia atrás hasta encontrar datos
        const seasons = [2026, 2025, 2024, 2023];
        let exito = false;

        for(let s of seasons) {
            if(exito) break;
            try {
                const response = await fetch(`https://v3.football.api-sports.io{ligaId}&season=${s}`, {
                    headers: { "x-rapidapi-key": KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const data = await response.json();

                if(data.response && data.response.length > 0) {
                    // Algunas ligas devuelven una sola tabla, otras varias (Apertura, Clausura, etc)
                    const todasLasTablas = data.response[0].league.standings;
                    procesarTablas(todasLasTablas);
                    exito = true;
                    console.log("Datos cargados de temporada: " + s);
                }
            } catch (e) {
                console.error("Error en temporada " + s);
            }
        }

        if(!exito) {
            loc.innerHTML = vis.innerHTML = "<option>Error al cargar</option>";
            alert("No se encontraron datos. Verifica si tu API Key aún tiene créditos gratis (son 100 al día).");
        }
    };

    function procesarTablas(tablas) {
        db = {};
        const loc = document.getElementById("local");
        const vis = document.getElementById("visitante");
        loc.innerHTML = vis.innerHTML = "";

        // Si la liga tiene varios grupos/fases, los unificamos
        tablas.forEach(fase => {
            fase.forEach(equipo => {
                const nombre = equipo.team.name;
                const pj = equipo.all.played || 1;
                
                // Guardamos estadísticas para el cálculo
                db[nombre] = {
                    atk: equipo.all.goals.for / pj,
                    def: equipo.all.goals.against / pj,
                    form: (equipo.all.win * 3 + equipo.all.draw) / (pj * 3)
                };

                loc.add(new Option(nombre, nombre));
                vis.add(new Option(nombre, nombre));
            });
        });
    }

    // El resto de tus funciones (poisson y calcular) se mantienen igual
</script>
