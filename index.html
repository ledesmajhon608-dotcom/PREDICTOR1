<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predictor PRO</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#22c55e;
--text:#f8fafc;
--dim:#94a3b8;
--border:#334155;
}

body{
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
min-height:100vh;
}

h1{
color:var(--accent);
margin-bottom:5px;
}

.subtitle{
font-size:11px;
color:var(--dim);
margin-bottom:20px;
}

.selector,
.resultado,
button{
width:100%;
max-width:420px;
box-sizing:border-box;
}

.selector{
background:var(--card);
padding:20px;
border-radius:18px;
border:1px solid var(--border);
}

label{
font-size:11px;
color:var(--accent);
display:block;
margin-bottom:4px;
}

select{
width:100%;
padding:10px;
border-radius:10px;
background:#0f172a;
border:1px solid var(--border);
color:white;
margin-bottom:12px;
}

button{
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-weight:bold;
cursor:pointer;
}

.resultado{
margin-top:20px;
background:var(--card);
border-radius:20px;
padding:20px;
border:1px solid var(--border);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.team{
font-weight:bold;
font-size:14px;
}

.vs{
background:#0f172a;
border-radius:50%;
padding:6px 10px;
border:1px solid var(--border);
font-size:11px;
}

.row{
margin-bottom:14px;
}

.row-top{
display:flex;
justify-content:space-between;
font-size:13px;
margin-bottom:4px;
}

.bar{
background:#0f172a;
height:10px;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
width:0;
transition:width 1.2s ease-in-out;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.mini{
background:#0f172a;
border:1px solid var(--border);
border-radius:12px;
padding:12px;
text-align:center;
}

.mini small{
color:var(--dim);
display:block;
font-size:10px;
margin-bottom:4px;
}

.bar-mini{
height:6px;
background:#020617;
border-radius:6px;
overflow:hidden;
margin-top:4px;
}

.tip{
margin-top:20px;
border:1px dashed var(--accent);
border-radius:12px;
padding:14px;
text-align:center;
background:rgba(34,197,94,0.1);
}

.tip small{
color:var(--accent);
font-size:10px;
}

</style>
</head>

<body>

<h1>⚽ Predictor PRO</h1>
<div class="subtitle">Datos vía API-Football</div>

<div class="selector">

<label>COMPETICIÓN</label>
<select id="liga">
<option value="">Seleccionar Liga</option>
<option value="premier">Premier League</option>
<option value="laliga">La Liga</option>
<option value="seriea">Serie A</option>
<option value="bundesliga">Bundesliga</option>
<option value="ligue1">Ligue 1</option>
<option value="mls">MLS</option>
<option value="brasil">Brasileirão</option>
<option value="argentina">Liga Argentina</option>
<option value="colombia">Liga BetPlay</option>
</select>

<label>LOCAL</label>
<select id="local"></select>

<label>VISITANTE</label>
<select id="visitante"></select>

</div>

<button onclick="calcular()">CALCULAR PREDICCIÓN</button>

<div id="resultado"></div>

<script>

const equipos={
"Bucaramanga":{atk:1.2,def:1.1},
"Deportivo Pereira":{atk:1.1,def:1.2},
"Real Madrid":{atk:2.3,def:0.9},
"Rayo Vallecano":{atk:1.1,def:1.4},
"Manchester City":{atk:2.5,def:0.8},
"Nottingham Forest":{atk:1.1,def:1.5}
};

const localSel=document.getElementById("local");
const visSel=document.getElementById("visitante");

Object.keys(equipos).forEach(t=>{
localSel.add(new Option(t,t));
visSel.add(new Option(t,t));
});

function calcular(){

const loc=localSel.value;
const vis=visSel.value;

if(loc===vis) return;

const l=equipos[loc];
const v=equipos[vis];

const expL=l.atk*v.def*1.1;
const expV=v.atk*l.def;

const total=expL+expV+1.2;

const pL=(expL/total*100).toFixed(1);
const pV=(expV/total*100).toFixed(1);
const pE=(100-pL-pV).toFixed(1);

const goles=(expL+expV);

const over15=Math.min(85,40+goles*15);
const over25=Math.min(75,30+goles*12);

const bttsSi=Math.min(70,goles*28);
const bttsNo=100-bttsSi;

const cornersLinea=(7.5+Math.random()).toFixed(1);
const cornersProb=Math.floor(50+Math.random()*20);

let rec="Doble oportunidad";
if(pL>48)rec="Gana "+loc;
if(pV>48)rec="Gana "+vis;

document.getElementById("resultado").innerHTML=`

<div class="resultado">

<div class="header">
<div class="team">${loc}</div>
<div class="vs">VS</div>
<div class="team">${vis}</div>
</div>

<div class="row">
<div class="row-top"><span>Victoria Local</span><strong>${pL}%</strong></div>
<div class="bar"><div class="fill" style="width:${pL}%;background:#22c55e"></div></div>
</div>

<div class="row">
<div class="row-top"><span>Empate</span><strong>${pE}%</strong></div>
<div class="bar"><div class="fill" style="width:${pE}%;background:#64748b"></div></div>
</div>

<div class="row">
<div class="row-top"><span>Victoria Visitante</span><strong>${pV}%</strong></div>
<div class="bar"><div class="fill" style="width:${pV}%;background:#ef4444"></div></div>
</div>

<div class="grid">

<div class="mini">
<small>AMBOS MARCAN</small>
<strong>SI ${bttsSi.toFixed(0)}%</strong><br>
<strong>NO ${bttsNo.toFixed(0)}%</strong>
</div>

<div class="mini">
<small>+1.5 GOLES</small>
<strong>${over15.toFixed(0)}%</strong>
<div class="bar-mini"><div class="fill" style="width:${over15}%;background:#22c55e"></div></div>
</div>

<div class="mini">
<small>+2.5 GOLES</small>
<strong>${over25.toFixed(0)}%</strong>
<div class="bar-mini"><div class="fill" style="width:${over25}%;background:#22c55e"></div></div>
</div>

<div class="mini">
<small>CORNERS LÍNEA ${cornersLinea}</small>
<strong>${cornersProb}%</strong>
<div class="bar-mini"><div class="fill" style="width:${cornersProb}%;background:#f59e0b"></div></div>
</div>

</div>

<div class="tip">
<small>APUESTA RECOMENDADA</small>
<div style="margin-top:6px;font-weight:bold">${rec}</div>
</div>

</div>
`;

setTimeout(()=>{
document.querySelectorAll(".fill").forEach(bar=>{
bar.style.width=bar.style.width;
});
},100);

}

</script>

</body>
</html>
