<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor ULTRA ELITE v6.0</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #22c55e;
            --border: #334155;
            --text: #f8fafc;
            --dim: #94a3b8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            color: var(--text);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items:center;
            margin: 0;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 480px; }
        
        h1 { 
            background: linear-gradient(to right, #22c55e, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center; margin: 15px 0 5px 0; font-size: 26px; font-weight: 900;
        }

        .subtitle { color: var(--dim); font-size: 10px; text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }

        .selector-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 25px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        label { font-size: 11px; color: var(--accent); font-weight: 800; display: block; margin-top: 15px; letter-spacing: 0.5px; }
        
        select { 
            width: 100%; padding: 14px; border-radius: 12px; background: #0f172a; 
            color: white; border: 1px solid var(--border); margin-top: 6px; font-size: 14px;
            outline: none; transition: 0.3s;
        }
        
        select:focus { border-color: var(--accent); }

        button {
            margin-top: 25px; width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white; font-weight: 900; font-size: 16px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
            transition: 0.3s;
        }

        button:active { transform: scale(0.98); }

        .season-badge { 
            background: rgba(34, 197, 94, 0.2); color: var(--accent);
            padding: 5px 12px; border-radius: 8px; font-size: 10px;
            font-weight: bold; display: inline-block; margin-top: 10px;
        }

        .resultado-container { margin-top: 30px; animation: slideUp 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); display: none; width: 100%; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .match-box { 
            background: var(--card); border-radius: 28px; padding: 25px; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .teams-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .team-display { width: 40%; text-align: center; font-weight: 800; font-size: 16px; line-height: 1.2; }
        .vs-circle { 
            background: #0f172a; border: 2px solid var(--accent); 
            width: 42px; height: 42px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; font-weight: 900; color: var(--accent);
        }

        .prob-row { margin-bottom: 15px; }
        .prob-info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; font-weight: 500; }
        .bar-outer { background: #0f172a; height: 12px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .bar-inner { 
            height: 100%; transition: width 1.5s cubic-bezier(0.1, 0, 0.1, 1); 
            background: linear-gradient(90deg, var(--accent), #4ade80);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .stat-card { 
            background: #0f172a; padding: 18px; border-radius: 18px; 
            text-align: center; border: 1px solid var(--border);
            transition: 0.3s;
        }
        .stat-card:hover { border-color: var(--accent); }
        .stat-card span { font-size: 9px; color: var(--dim); text-transform: uppercase; display: block; margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
        .stat-card b { font-size: 20px; display: block; font-weight: 800; }
        
        .val-accent { color: var(--accent); }
        .val-warning { color: var(--warning); }
        .val-info { color: var(--info); }

        .bet-tip { 
            margin-top: 25px; background: linear-gradient(135deg, rgba(34,197,94,0.1) 0%, rgba(22,163,74,0.05) 100%);
            border: 2px dashed var(--accent); padding: 20px; border-radius: 20px; text-align: center;
        }
        .bet-tip span { font-size: 10px; color: var(--dim); font-weight: 800; text-transform: uppercase; }
        .bet-tip b { color: var(--accent); font-size: 20px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ PREDICTOR ELITE</h1>
    <div class="subtitle">AI Statistical Analysis v6.0</div>

    <div class="selector-card">
        <label>COMPETICIÓN PROFESIONAL</label>
        <select id="liga">
            <option value="">Seleccione liga...</option>
            <option value="2">Champions League (UEFA)</option>
            <option value="39">Premier League (Inglaterra)</option>
            <option value="140">La Liga (España)</option>
            <option value="135">Serie A (Italia)</option>
            <option value="78">Bundesliga (Alemania)</option>
            <option value="239">Liga BetPlay (Colombia)</option>
            <option value="71">Brasileirão (Brasil)</option>
            <option value="128">Liga Argentina</option>
            <option value="253">MLS (USA)</option>
        </select>
        <div id="statusSeason" class="season-badge" style="display:none"></div>
        
        <label>EQUIPO LOCAL</label><select id="local"></select>
        <label>EQUIPO VISITANTE</label><select id="visitante"></select>

        <button onclick="calcularTodo()">Analizar Partido</button>
    </div>

    <div id="resultado" class="resultado-container">
        <div class="match-box">
            <div class="teams-header">
                <div id="lNameDisplay" class="team-display"></div>
                <div class="vs-circle">VS</div>
                <div id="vNameDisplay" class="team-display"></div>
            </div>

            <div class="prob-row">
                <div class="prob-info"><span>Victoria Local</span> <b id="probLVal">0%</b></div>
                <div class="bar-outer"><div id="barLFill" class="bar-inner"></div></div>
            </div>
            <div class="prob-row">
                <div class="prob-info"><span>Empate</span> <b id="probEVal">0%</b></div>
                <div class="bar-outer"><div id="barEFill" class="bar-inner" style="background: var(--dim)"></div></div>
            </div>
            <div class="prob-row">
                <div class="prob-info"><span>Victoria Visitante</span> <b id="probVVal">0%</b></div>
                <div class="bar-outer"><div id="barVFill" class="bar-inner" style="background: var(--danger)"></div></div>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><span>Ambos Marcan</span><b id="probAmbosVal" class="val-accent">0%</b></div>
                <div class="stat-card"><span>MÁS 1.5 GOLES</span><b id="probOver15Val" class="val-accent">0%</b></div>
                <div class="stat-card"><span>MÁS 2.5 GOLES</span><b id="probOver25Val" class="val-warning">0%</b></div>
                <div class="stat-card"><span>CORNERS +7.5</span><b id="probCornersVal" class="val-info">0%</b></div>
            </div>

            <div class="bet-tip">
                <span>RECOMENDACIÓN ELITE</span>
                <b id="recText"></b>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "ea232d851cb4197391464e2c61df516b";
    const API_BASE = "https://v3.football.api-sports.io/standings";
    let baseDatos = {};

    document.getElementById("liga").onchange = async function() {
        const ligaId = this.value; if(!ligaId) return;
        const anios = [2026, 2025, 2024]; let exito = false;
        document.getElementById("statusSeason").style.display = "none";
        
        for(let anio of anios) {
            if(exito) break;
            try {
                const res = await fetch(`${API_BASE}?league=${ligaId}&season=${anio}`, { 
                    headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" } 
                });
                const json = await res.json();
                if(json.response && json.response.length > 0) {
                    procesarData(json.response[0].league.standings);
                    document.getElementById("statusSeason").style.display = "inline-block";
                    document.getElementById("statusSeason").innerText = "DATOS ACTUALIZADOS: " + anio;
                    exito = true;
                }
            } catch (e) { console.error("Error año " + anio); }
        }
    };

    function procesarData(data) {
        baseDatos = {}; 
        const loc = document.getElementById("local"); 
        const vis = document.getElementById("visitante");
        loc.innerHTML = vis.innerHTML = "";
        
        data.forEach(grupo => {
            grupo.forEach(t => {
                const n = t.team.name;
                baseDatos[n] = { 
                    hAtk: t.home.goals.for / (t.home.played || 1), 
                    hDef: t.home.goals.against / (t.home.played || 1), 
                    aAtk: t.away.goals.for / (t.away.played || 1), 
                    aDef: t.away.goals.against / (t.away.played || 1),
                    form: t.form || "WWWWW"
                };
                loc.add(new Option(n, n)); vis.add(new Option(n, n));
            });
        });
    }

    function poisson(lambda, k) { 
        let fact = 1; for(let i=1; i<=k; i++) fact *= i; 
        return (Math.pow(lambda, k) * Math.exp(-lambda)) / fact; 
    }

    function calcularTodo() {
        const lN = document.getElementById("local").value; 
        const vN = document.getElementById("visitante").value;
        if(!lN || !vN || lN === vN) return alert("Selecciona dos equipos diferentes");
        
        const L = baseDatos[lN]; const V = baseDatos[vN];
        
        // Algoritmo refinado con ponderación por forma reciente
        let modFormL = (L.form.split('W').length - 1) * 0.05;
        let modFormV = (V.form.split('W').length - 1) * 0.05;

        let expL = (L.hAtk * V.aDef * 1.10) + modFormL; 
        let expV = (V.aAtk * L.hDef * 0.95) + modFormV;

        const pL0 = poisson(expL, 0); const pL1 = poisson(expL, 1);
        const pV0 = poisson(expV, 0); const pV1 = poisson(expV, 1);

        const probE = ((pL0 * pV0) + (pL1 * pV1) + (poisson(expL,2)*poisson(expV,2))) * 100;
        const totalExp = expL + expV;
        let pLocal = (expL / totalExp) * (100 - probE);
        let pVis = (expV / totalExp) * (100 - probE);

        // Mercados secundarios
        const ambos = (1 - pL0) * (1 - pV0) * 105; // Factor corrección liga moderna
        const over15 = (1 - (pL0 * pV0)) * 100;
        const over25 = (1 - (pL0*pV0 + pL0*pV1 + pL1*pV0)) * 100;
        let probCorners = Math.min(96, Math.max(35, ((expL + expV) * 19) + 12));

        // Animación y UI
        document.getElementById("resultado").style.display = "block";
        document.getElementById("lNameDisplay").innerText = lN;
        document.getElementById("vNameDisplay").innerText = vN;
        
        setTimeout(() => {
            document.getElementById("probLVal").innerText = pLocal.toFixed(1) + "%";
            document.getElementById("barLFill").style.width = pLocal + "%";
            document.getElementById("probEVal").innerText = probE.toFixed(1) + "%";
            document.getElementById("barEFill").style.width = probE + "%";
            document.getElementById("probVVal").innerText = pVis.toFixed(1) + "%";
            document.getElementById("barVFill").style.width = pVis + "%";

            document.getElementById("probAmbosVal").innerText = Math.min(99, ambos).toFixed(0) + "%";
            document.getElementById("probOver15Val").innerText = Math.min(99, over15).toFixed(0) + "%";
            document.getElementById("probOver25Val").innerText = Math.min(99, over25).toFixed(0) + "%";
            document.getElementById("probCornersVal").innerText = probCorners.toFixed(0) + "%";
        }, 100);

        let tip = "Buscando Valor...";
        if(pLocal > 60) tip = "Victoria Local Directa";
        else if(pVis > 60) tip = "Victoria Visitante Directa";
        else if(ambos > 65) tip = "Ambos Marcan (Sí)";
        else if(over15 > 80) tip = "Más de 1.5 Goles";
        else tip = "Doble Oportunidad Local";
        
        document.getElementById("recText").innerText = tip;
    }
</script>
</body>
</html>
