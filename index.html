<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Predictor PRO</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

.equipos{
display:flex;
justify-content:center;
align-items:center;
gap:25px;
flex-wrap:wrap;
}

.equipo{
display:flex;
flex-direction:column;
align-items:center;
}

.vs{
font-size:22px;
font-weight:bold;
margin-top:25px;
}

select{
padding:10px;
border-radius:8px;
border:none;
margin-top:5px;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

.resultado{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:12px;
width:360px;
margin-left:auto;
margin-right:auto;
}

.teams{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.teams img{
width:40px;
height:40px;
object-fit:contain;
}

.bar{
background:#334155;
height:10px;
border-radius:10px;
overflow:hidden;
margin-bottom:12px;
}

.fill{
background:#22c55e;
height:100%;
}

hr{
border:1px solid #334155;
margin:15px 0;
}

</style>
</head>

<body>

<h1>⚽ Predictor PRO</h1>

<h3>Selecciona Liga</h3>

<select id="liga">

<option value="">-- Selecciona Liga --</option>
<option value="bundesliga">Bundesliga</option>

</select>

<br><br>

<div class="equipos">

<div class="equipo">
<label>Equipo Local</label>
<select id="local"></select>
</div>

<div class="vs">VS</div>

<div class="equipo">
<label>Equipo Visitante</label>
<select id="visitante"></select>
</div>

</div>

<button onclick="calcular()">Calcular Predicción</button>

<div class="resultado" id="resultado"></div>

<script>

/* LIGA */

const ligas={

bundesliga:[
"Bayern Munich",
"Borussia Dortmund",
"RB Leipzig",
"Bayer Leverkusen",
"Wolfsburg",
"Eintracht Frankfurt",
"Stuttgart",
"Union Berlin",
"Freiburg",
"Hoffenheim",
"Werder Bremen",
"Augsburg",
"Bochum",
"Mainz",
"Koln",
"Borussia Monchengladbach",
"Heidenheim",
"Darmstadt"
]

}

/* LOGOS */

const logos={

"Bayern Munich":"https://crests.football-data.org/5.png",
"Borussia Dortmund":"https://crests.football-data.org/4.png",
"RB Leipzig":"https://crests.football-data.org/721.png",
"Bayer Leverkusen":"https://crests.football-data.org/3.png",
"Wolfsburg":"https://crests.football-data.org/11.png",
"Eintracht Frankfurt":"https://crests.football-data.org/19.png",
"Stuttgart":"https://crests.football-data.org/10.png",
"Union Berlin":"https://crests.football-data.org/28.png",
"Freiburg":"https://crests.football-data.org/17.png",
"Hoffenheim":"https://crests.football-data.org/2.png",
"Werder Bremen":"https://crests.football-data.org/12.png",
"Augsburg":"https://crests.football-data.org/16.png",
"Bochum":"https://crests.football-data.org/36.png",
"Mainz":"https://crests.football-data.org/15.png",
"Koln":"https://crests.football-data.org/1.png",
"Borussia Monchengladbach":"https://crests.football-data.org/18.png",
"Heidenheim":"https://crests.football-data.org/44.png",
"Darmstadt":"https://crests.football-data.org/98.png"

}

/* SELECTS */

const ligaSelect=document.getElementById("liga")
const localSelect=document.getElementById("local")
const visitanteSelect=document.getElementById("visitante")

ligaSelect.addEventListener("change",cargarEquipos)

function cargarEquipos(){

const liga=ligaSelect.value

localSelect.innerHTML=""
visitanteSelect.innerHTML=""

ligas[liga].forEach(eq=>{

let op1=document.createElement("option")
op1.value=eq
op1.text=eq
localSelect.appendChild(op1)

let op2=document.createElement("option")
op2.value=eq
op2.text=eq
visitanteSelect.appendChild(op2)

})

}

/* CALCULO */

function calcular(){

const local=localSelect.value
const visitante=visitanteSelect.value

let golesLocal=Math.random()*2+0.5
let golesVisita=Math.random()*2+0.5

let golesTotal=golesLocal+golesVisita

let empate=20+Math.random()*10
let restante=100-empate

let probLocal=(golesLocal/(golesLocal+golesVisita))*restante
let probVisita=(golesVisita/(golesLocal+golesVisita))*restante

probLocal=probLocal.toFixed(1)
probVisita=probVisita.toFixed(1)
empate=empate.toFixed(1)

golesTotal=golesTotal.toFixed(2)

let over15=Math.min(95,(golesTotal/3)*100).toFixed(0)
let over25=Math.min(90,(golesTotal/4)*100).toFixed(0)

let ambos=(golesLocal*golesVisita*20).toFixed(0)
let corners=(8+Math.random()*4).toFixed(1)

/* RESULTADO */

document.getElementById("resultado").innerHTML=`

<div class="teams">

<div>
<img src="${logos[local] || 'https://upload.wikimedia.org/wikipedia/commons/6/6e/Soccer_ball.svg'}"><br>${local}
</div>

<strong>VS</strong>

<div>
<img src="${logos[visitante] || 'https://upload.wikimedia.org/wikipedia/commons/6/6e/Soccer_ball.svg'}"><br>${visitante}
</div>

</div>

<p>Local ${probLocal}%</p>
<div class="bar"><div class="fill" style="width:${probLocal}%"></div></div>

<p>Empate ${empate}%</p>
<div class="bar"><div class="fill" style="width:${empate}%"></div></div>

<p>Visita ${probVisita}%</p>
<div class="bar"><div class="fill" style="width:${probVisita}%"></div></div>

<hr>

<p>⚽ Goles esperados: <b>${golesTotal}</b></p>

<p>📈 Over 1.5 goles: <b>${over15}%</b></p>
<p>📈 Over 2.5 goles: <b>${over25}%</b></p>

<hr>

<p>🔥 Ambos marcan: <b>${ambos}%</b></p>

<p>🚩 Corners estimados: <b>${corners}</b></p>

`

}

</script>

</body>
</html>
