<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predictor Elite PRO</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#22c55e">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>

    <div class="container">
        <h1>⚽ PREDICTOR ELITE</h1>
        <div class="subtitle">Dixon-Coles + HT Factor</div>

        <div class="selector-card">
            <label>LIGA</label>
            <select id="liga">
                <option value="">Seleccione liga...</option>
                <option value="239">Liga BetPlay 🇨🇴</option>
                <option value="39">Premier League 🏴󠁧󠁢󠁥󠁮󠁧󠁿</option>
                <option value="140">La Liga 🇪🇸</option>
            </select>
            
            <div id="statusSeason" class="season-badge" style="display:none"></div>

            <label>LOCAL</label>
            <select id="local"><option>Cargando...</option></select>
            
            <label>VISITANTE</label>
            <select id="visitante"><option>Cargando...</option></select>

            <button onclick="calcularTodo()">GENERAR PRONÓSTICO</button>
        </div>

        <div id="resultado" class="resultado-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
