<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor PRO ELITE v7.5 - Full Edition</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #22c55e;
            --border: #334155;
            --text: #f8fafc;
            --dim: #94a3b8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            color: var(--text);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items:center;
            margin: 0;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 480px; }
        
        h1 { 
            background: linear-gradient(to right, #22c55e, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center; margin: 15px 0 5px 0; font-size: 26px; font-weight: 900;
        }

        .subtitle { color: var(--dim); font-size: 10px; text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }

        .selector-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        label { font-size: 10px; color: var(--accent); font-weight: 800; display: block; margin-top: 12px; text-transform: uppercase; }
        
        select { 
            width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; 
            color: white; border: 1px solid var(--border); margin-top: 4px; font-size: 13px;
            outline: none;
        }

        .btn-news {
            width: 100%; padding: 8px; background: #1e293b; border: 1px solid var(--border);
            color: var(--dim); border-radius: 8px; font-size: 10px; cursor: pointer; margin-top: 5px;
            font-weight: 700; transition: 0.3s;
        }
        .btn-news:hover { background: #334155; color: white; }

        button.main-btn {
            margin-top: 25px; width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white; font-weight: 900; font-size: 16px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
        }

        .resultado-container { margin-top: 30px; animation: slideUp 0.5s ease-out; display: none; width: 100%; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .match-box { background: var(--card); border-radius: 28px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); }

        .teams-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .team-display { width: 35%; text-align: center; font-weight: 800; font-size: 15px; }
        .vs-container { display: flex; flex-direction: column; align-items: center; }
        .vs-circle { 
            background: #0f172a; border: 2px solid var(--accent); 
            width: 40px; height: 40px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; font-weight: 900; color: var(--accent);
        }

        .prob-row { margin-bottom: 12px; }
        .prob-info { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
        .bar-outer { background: #0f172a; height: 10px; border-radius: 20px; overflow: hidden; }
        .bar-inner { height: 100%; transition: width 1s ease-in-out; background: linear-gradient(90deg, var(--accent), #4ade80); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-card { background: #0f172a; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .stat-card span { font-size: 9px; color: var(--dim); text-transform: uppercase; display: block; margin-bottom: 5px; font-weight: 700; }
        .stat-card b { font-size: 18px; display: block; font-weight: 800; }

        .bet-tip { margin-top: 20px; background: rgba(34,197,94,0.1); border: 2px dashed var(--accent); padding: 15px; border-radius: 20px; text-align: center; }
        .bet-tip b { color: var(--accent); font-size: 18px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ PREDICTOR ELITE v7.5</h1>
    <div class="subtitle">Dixon-Coles • Altitud • Factor Humano</div>

    <div class="selector-card">
        <label>Competición</label>
        <select id="liga">
            <option value="">Seleccione liga...</option>
            <option value="239">Liga BetPlay 🇨🇴</option>
            <option value="39">Premier League 🏴󠁧󠁢󠁥󠁮󠁧󠁿</option>
            <option value="140">La Liga 🇪🇸</option>
            <option value="135">Serie A 🇮🇹</option>
            <option value="78">Bundesliga 🇩🇪</option>
        </select>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>Local</label>
                <select id="local"></select>
                <button class="btn-news" onclick="buscarNoticias('local')">🔍 INVESTIGAR</button>
                <label style="color:var(--danger)">Bajas</label>
                <select id="bajasL">
                    <option value="0">Ninguna</option>
                    <option value="0.12">1 Estrella</option>
                    <option value="0.25">Múltiples</option>
                    <option value="0.45">Equipo B</option>
                </select>
            </div>
            <div>
                <label>Visitante</label>
                <select id="visitante"></select>
                <button class="btn-news" onclick="buscarNoticias('visitante')">🔍 INVESTIGAR</button>
                <label style="color:var(--danger)">Bajas</label>
                <select id="bajasV">
                    <option value="0">Ninguna</option>
                    <option value="0.12">1 Estrella</option>
                    <option value="0.25">Múltiples</option>
                    <option value="0.45">Equipo B</option>
                </select>
            </div>
        </div>

        <button class="main-btn" onclick="calcularTodo()">GENERAR PRONÓSTICO</button>
    </div>

    <div id="resultado" class="resultado-container">
        <div class="match-box">
            <div class="teams-header">
                <div id="lNameDisplay" class="team-display"></div>
                <div class="vs-container">
                    <div class="vs-circle">VS</div>
                    <div id="semaforo" style="margin-top: 8px; width: 10px; height: 10px; border-radius: 50%; background: gray;"></div>
                    <span id="nivelRiesgo" style="font-size: 7px; font-weight: 900; margin-top: 3px;">---</span>
                </div>
                <div id="vNameDisplay" class="team-display"></div>
            </div>

            <div class="prob-row">
                <div class="prob-info"><span>Victoria Local</span> <b id="probLVal">0%</b></div>
                <div class="bar-outer"><div id="barLFill" class="bar-inner"></div></div>
            </div>
            <div class="prob-row">
                <div class="prob-info"><span>Empate</span> <b id="probEVal">0%</b></div>
                <div class="bar-outer"><div id="barEFill" class="bar-inner" style="background: var(--dim)"></div></div>
            </div>
            <div class="prob-row">
                <div class="prob-info"><span>Victoria Visita</span> <b id="probVVal">0%</b></div>
                <div class="bar-outer"><div id="barVFill" class="bar-inner" style="background: var(--danger)"></div></div>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><span>Ambos Marcan</span><b id="probAmbosVal">0%</b></div>
                <div class="stat-card"><span>Over 2.5</span><b id="probOver25Val">0%</b></div>
                <div class="stat-card" style="grid-column: span 2; text-align: left;">
                    <span>Top 3 Marcadores Probables</span>
                    <div id="topMarcadores" style="font-size: 13px; margin-top: 5px; line-height: 1.6;"></div>
                </div>
            </div>

            <div class="bet-tip">
                <span style="font-size: 9px; font-weight: 800; color: var(--dim);">RECOMENDACIÓN FINAL</span>
                <b id="recText"></b>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "ea232d851cb4197391464e2c61df516b";
    let baseDatos = {};

    const altitudes = {
        "Pasto": 2527, "Independiente Santa Fe": 2600, "Millonarios": 2600, 
        "Fortaleza CEIF": 2600, "Boyacá Chicó": 2810, "Patriotas": 2810,
        "La Equidad": 2600, "Once Caldas": 2150, "Atlético Nacional": 1495, 
        "Independiente Medellín": 1495, "Envigado": 1575, "Águilas Doradas": 2125,
        "Deportivo Cali": 1000, "América de Cali": 1000, "Junior": 18, "Jaguares": 18
    };

    document.getElementById("liga").onchange = async function() {
        const ligaId = this.value; if(!ligaId) return;
        const res = await fetch(`https://v3.football.api-sports.io/standings?league=${ligaId}&season=2026`, { 
            headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" } 
        });
        const json = await res.json();
        if(json.response) procesarData(json.response[0].league.standings);
    };

    function procesarData(data) {
        baseDatos = {}; 
        const loc = document.getElementById("local"); const vis = document.getElementById("visitante");
        loc.innerHTML = vis.innerHTML = "<option>Seleccione equipo...</option>";
        const agregados = new Set();
        data.forEach(g => g.forEach(t => {
            const n = t.team.name;
            if(!agregados.has(n)){
                baseDatos[n] = { hAtk: t.home.goals.for/(t.home.played||1), hDef: t.home.goals.against/(t.home.played||1), 
                                 aAtk: t.away.goals.for/(t.away.played||1), aDef: t.away.goals.against/(t.away.played||1),
                                 pts: t.points, p: t.all.played };
                loc.add(new Option(n, n)); vis.add(new Option(n, n)); agregados.add(n);
            }
        }));
    }

    function buscarNoticias(lado) {
        const eq = document.getElementById(lado).value;
        if(eq) window.open(`https://www.google.com/search?q=${encodeURIComponent(eq + " bajas alineaciones hoy")}&tbm=nws`, '_blank');
    }

    function poisson(l, k) { return (Math.pow(l, k) * Math.exp(-l)) / [1,1,2,6,24,120,720,5040][k]; }

    function calcularTodo() {
        const lN = document.getElementById("local").value; const vN = document.getElementById("visitante").value;
        if(lN === vN) return alert("Selecciona equipos diferentes");
        const L = baseDatos[lN], V = baseDatos[vN];
        
        const fL = 1 - document.getElementById("bajasL").value;
        const fV = 1 - document.getElementById("bajasV").value;
        const altL = altitudes[lN]||500, altV = altitudes[vN]||500;
        const bAlt = (altL-altV > 1000) ? 1.12 : 1.0;

        let eL = (L.hAtk * V.aDef * 1.1) * bAlt * fL;
        let eV = (V.aAtk * L.hDef * 0.9) * fV;

        let pL = [], pV = [], m = [];
        for(let i=0; i<6; i++) { pL.push(poisson(eL, i)); pV.push(poisson(eV, i)); }

        let winL = 0, winV = 0, draw = 0;
        const RHO = -0.1;
        for(let i=0; i<6; i++) {
            for(let j=0; j<6; j++) {
                let p = pL[i] * pV[j];
                if(i==0 && j==0) p *= (1 - eL*eV*RHO);
                if(i>j) winL += p; else if(i<j) winV += p; else draw += p;
                m.push({ s: `${i}-${j}`, p: p*100 });
            }
        }

        document.getElementById("resultado").style.display = "block";
        document.getElementById("lNameDisplay").innerText = lN;
        document.getElementById("vNameDisplay").innerText = vN;
        document.getElementById("probLVal").innerText = (winL*100).toFixed(1) + "%";
        document.getElementById("barLFill").style.width = (winL*100) + "%";
        document.getElementById("probEVal").innerText = (draw*100).toFixed(1) + "%";
        document.getElementById("barEFill").style.width = (draw*100) + "%";
        document.getElementById("probVVal").innerText = (winV*100).toFixed(1) + "%";
        document.getElementById("barVFill").style.width = (winV*100) + "%";

        m.sort((a,b) => b.p - a.p);
        document.getElementById("topMarcadores").innerHTML = m.slice(0,3).map(x => `<div><b>${x.s}</b> <span style="float:right">${x.p.toFixed(1)}%</span></div>`).join("");

        // Semáforo
        const dif = Math.abs(winL - winV);
        const sem = document.getElementById("semaforo");
        const txt = document.getElementById("nivelRiesgo");
        if(dif < 0.05 || (fL+fV < 1.8)) { sem.style.background = "#ef4444"; txt.innerText="RIESGO ALTO"; }
        else if(dif < 0.15) { sem.style.background = "#f59e0b"; txt.innerText="RIESGO MEDIO"; }
        else { sem.style.background = "#22c55e"; txt.innerText="CONFIANZA ALTA"; }

        document.getElementById("recText").innerText = (winL > 0.45) ? "LOCAL O EMPATE (1X)" : (winV > 0.45) ? "EMPATE O VISITANTE (X2)" : "OVER 1.5 GOLES";
        document.getElementById("probAmbosVal").innerText = ((1-pL[0])*(1-pV[0])*100).toFixed(0) + "%";
        document.getElementById("probOver25Val").innerText = ((1-(pL[0]*pV[0]+pL[0]*pV[1]+pL[1]*pV[0])).toFixed(2)*100).toFixed(0) + "%";
    }
</script>
</body>
</html>
