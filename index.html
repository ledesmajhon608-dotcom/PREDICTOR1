<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Predictor Elite GLOBAL v11.0</title>
    <style>
        :root {
            --bg: #020617; --card: #1e293b; --accent: #22c55e;
            --border: #334155; --text: #f8fafc; --dim: #94a3b8;
            --danger: #ef4444; --warning: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            color: var(--text); margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 480px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--accent); margin: 0; font-size: 26px; font-weight: 900; }
        .header p { color: var(--dim); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }

        .selector-card {
            background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px);
            padding: 20px; border-radius: 24px; border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        label { display: block; margin-top: 12px; color: var(--accent); font-size: 10px; font-weight: 800; text-transform: uppercase; }
        select {
            width: 100%; padding: 14px; margin-top: 5px; border-radius: 12px;
            background: #0f172a; color: white; border: 1px solid var(--border); outline: none; font-size: 14px;
        }
        button {
            width: 100%; padding: 18px; margin-top: 25px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, #22c55e, #16a34a); color: white; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        button:active { transform: scale(0.96); }

        .resultado-container { margin-top: 25px; display: none; width: 100%; animation: fadeIn 0.4s ease; }
        .res-card { background: var(--card); padding: 20px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1); }
        
        .match-header { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .team-box { text-align: center; width: 35%; }
        .team-logo { width: 50px; height: 50px; object-fit: contain; margin-bottom: 8px; }
        .team-name { font-size: 12px; font-weight: 700; }

        .prob-item { margin-bottom: 12px; }
        .prob-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; font-weight: 600; }
        .bar-bg { background: #0f172a; height: 8px; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 1s ease-out; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: #0f172a; padding: 12px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .stat-val { font-size: 18px; font-weight: 900; color: var(--accent); display: block; }
        .stat-desc { font-size: 9px; color: var(--dim); text-transform: uppercase; }

        .ai-pick { 
            margin-top: 20px; padding: 15px; border-radius: 18px; text-align: center;
            background: rgba(34, 197, 94, 0.1); border: 1px dashed var(--accent);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚽ PREDICTOR ELITE</h1>
        <p>Global Football Analytics</p>
    </div>

    <div class="selector-card">
        <label>Liga / Competición</label>
        <select id="liga">
            <option value="">Selecciona una liga...</option>
            <optgroup label="Sudamérica">
                <option value="239">Liga BetPlay 🇨🇴</option>
                <option value="71">Brasileirão Serie A 🇧🇷</option>
                <option value="128">Liga Argentina 🇦🇷</option>
                <option value="262">Liga MX 🇲🇽</option>
            </optgroup>
            <optgroup label="Europa">
                <option value="39">Premier League 🏴󠁧󠁢󠁥󠁮󠁧󠁿</option>
                <option value="140">La Liga 🇪🇸</option>
                <option value="135">Serie A 🇮🇹</option>
                <option value="78">Bundesliga 🇩🇪</option>
                <option value="61">Ligue 1 🇫🇷</option>
                <option value="94">Primeira Liga 🇵🇹</option>
            </optgroup>
            <optgroup label="Norteamérica / Otros">
                <option value="253">MLS 🇺🇸</option>
                <option value="2">Champions League 🇪🇺</option>
            </optgroup>
        </select>

        <label>Local</label>
        <select id="local"><option value="">-- Elige liga primero --</option></select>

        <label>Visitante</label>
        <select id="visitante"><option value="">-- Elige liga primero --</option></select>

        <button onclick="calcular()">GENERAR PRONÓSTICO</button>
    </div>

    <div id="resultado" class="resultado-container"></div>
</div>

<script>
    const API_KEY = "ea232d851cb4197391464e2c61df516b";
    let db = {};

    document.getElementById("liga").onchange = async function() {
        const id = this.value; if(!id) return;
        this.disabled = true;
        try {
            const res = await fetch(`https://v3.football.api-sports.io/standings?league=${id}&season=2025`, {
                headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
            });
            const json = await res.json();
            const data = json.response[0].league.standings[0];
            
            const loc = document.getElementById("local");
            const vis = document.getElementById("visitante");
            loc.innerHTML = vis.innerHTML = "";
            db = {};

            data.forEach(t => {
                db[t.team.name] = {
                    hAtk: t.home.goals.for / (t.home.played || 1),
                    hDef: t.home.goals.against / (t.home.played || 1),
                    aAtk: t.away.goals.for / (t.away.played || 1),
                    aDef: t.away.goals.against / (t.away.played || 1),
                    logo: t.team.logo
                };
                loc.add(new Option(t.team.name, t.team.name));
                vis.add(new Option(t.team.name, t.team.name));
            });
        } catch (e) { alert("Error al conectar con la API."); }
        this.disabled = false;
    };

    function poisson(l, k) {
        let f = [1, 1, 2, 6, 24, 120, 720];
        return (Math.pow(l, k) * Math.exp(-l)) / (f[k] || 5040);
    }

    function calcular() {
        const nL = document.getElementById("local").value;
        const nV = document.getElementById("visitante").value;
        if(!db[nL]) return;

        const L = db[nL]; const V = db[nV];
        let xgL = L.hAtk * V.aDef * 1.05; let xgV = V.aAtk * L.hDef;

        let pL = 0, pE = 0, pV = 0;
        for(let i=0; i<6; i++) {
            for(let j=0; j<6; j++) {
                let p = poisson(xgL, i) * poisson(xgV, j);
                if(i > j) pL += p; else if(i === j) pE += p; else pV += p;
            }
        }

        let ambos = ((1 - Math.exp(-xgL)) * (1 - Math.exp(-xgV))) * 100;
        let mas15 = (1 - (poisson(xgL+xgV, 0) + poisson(xgL+xgV, 1))) * 100;
        let probHT = (1 - Math.exp(-(xgL + xgV) * 0.44)) * 100;

        const res = document.getElementById("resultado");
        res.style.display = "block";
        res.innerHTML = `
            <div class="res-card">
                <div class="match-header">
                    <div class="team-box"><img src="${L.logo}" class="team-logo"><div class="team-name">${nL}</div></div>
                    <div style="font-size:20px; font-weight:900; color:var(--dim);">VS</div>
                    <div class="team-box"><img src="${V.logo}" class="team-logo"><div class="team-name">${nV}</div></div>
                </div>

                <div class="prob-item">
                    <div class="prob-info"><span>Victoria Local</span><span>${(pL*100).toFixed(0)}%</span></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${pL*100}%; background:var(--accent)"></div></div>
                </div>
                <div class="prob-item">
                    <div class="prob-info"><span>Empate</span><span>${(pE*100).toFixed(0)}%</span></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${pE*100}%; background:var(--dim)"></div></div>
                </div>
                <div class="prob-item">
                    <div class="prob-info"><span>Victoria Visitante</span><span>${(pV*100).toFixed(0)}%</span></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${pV*100}%; background:var(--danger)"></div></div>
                </div>

                <div class="stats-grid">
                    <div class="stat-box"><span class="stat-val">${probHT.toFixed(0)}%</span><span class="stat-desc">Gol 1er T.</span></div>
                    <div class="stat-box"><span class="stat-val">${ambos.toFixed(0)}%</span><span class="stat-desc">Ambos Marcan</span></div>
                    <div class="stat-box"><span class="stat-val">${mas15.toFixed(0)}%</span><span class="stat-desc">+1.5 Goles</span></div>
                    <div class="stat-box"><span class="stat-val">${((xgL + xgV) * 3.8 + 2).toFixed(1)}</span><span class="stat-desc">Córners Est.</span></div>
                </div>

                <div class="ai-pick">
                    <div style="font-size:10px; color:var(--accent); font-weight:900; text-transform:uppercase;">Pick Sugerido</div>
                    <div style="font-size:18px; font-weight:900; margin:5px 0;">${pL > pV ? '1X / Local' : 'X2 / Visitante'}</div>
                    <div style="font-size:11px; color:var(--dim);">Nivel Confianza: ${(Math.max(pL, pV, pE) * 10).toFixed(1)}/10</div>
                </div>
            </div>`;
    }
</script>
</body>
</html>
