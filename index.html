<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predictor PRO Ultra</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#22c55e;
--border:#334155;
--text:#f8fafc;
--dim:#94a3b8;
}

body{
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
padding:20px;
display:flex;
flex-direction:column;

}

}

.subtitle{
color:var(--dim);
font-size:11px;
margin-bottom:20px;
}

.selector{

border-radius:20px;

}

label{
font-size:11px;

margin-bottom:5px;
}

select{
width:100%;
padding:12px;

background:#0f172a;

border:1px solid var(--border);
}

button{
margin-top:15px;
width:100%;
max-width:420px;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.resultado{
margin-top:25px;

box-sizing:border-box;
}

justify-content:space-between;

}

}

background:var(--bg);

}

</head>

<body>

<h1>⚽ Predictor PRO Ultra</h1>
<div class="subtitle">Modelo avanzado con forma y ranking</div>

<div class="selector">

<label>COMPETICIÓN</label>
<select id="liga">

<option value="">Seleccionar</option>
<option value="39">Premier League</option>
<option value="140">La Liga</option>
<option value="135">Serie A</option>
<option value="78">Bundesliga</option>
<option value="61">Ligue 1</option>
<option value="253">MLS</option>
<option value="71">Brasileirão</option>
<option value="128">Liga Argentina</option>
<option value="239">Liga BetPlay</option>

</select>

<label>LOCAL</label>
<select id="local"></select>

<label>VISITANTE</label>
<select id="visitante"></select>

</div>

<button onclick="calcular()">CALCULAR PREDICCIÓN</button>

<div id="resultado"></div>

<script>

const API="https://v3.football.api-sports.io/standings";
const KEY="ea232d851cb4197391464e2c61df516b";

let equipos={};

document.getElementById("liga").onchange=async function(){

const liga=this.value;
if(!liga)return;

const temporadas=[2026,2025,2024];
let datos=null;

for(let s of temporadas){

try{

const res=await fetch(`${API}?league=${liga}&season=${s}`,{
headers:{
"x-rapidapi-key":KEY,
"x-rapidapi-host":"v3.football.api-sports.io"
}
});

const json=await res.json();

if(json.response.length){

datos=json.response[0].league.standings;
break;

}

}catch(e){}

}

if(datos) cargarEquipos(datos);

};

function cargarEquipos(data){

equipos={};

const loc=document.getElementById("local");
const vis=document.getElementById("visitante");

loc.innerHTML="";
vis.innerHTML="";

data.forEach(group=>{

group.forEach(t=>{

const name=t.team.name;

if(equipos[name])return;

const pj=t.all.played||1;

equipos[name]={

atk:t.all.goals.for/pj,
def:t.all.goals.against/pj,
rank:t.rank,
win:t.all.win,
draw:t.all.draw,
lose:t.all.lose

};

loc.add(new Option(name,name));
vis.add(new Option(name,name));

});

});

}

function calcular(){

const l=document.getElementById("local").value;
const v=document.getElementById("visitante").value;

if(!equipos[l]||l===v)return;

const sL=equipos[l];
const sV=equipos[v];

const formL=(sL.win+sL.draw*0.5)/(sL.win+sL.draw+sL.lose);
const formV=(sV.win+sV.draw*0.5)/(sV.win+sV.draw+sV.lose);

const rankFactor=(sV.rank-sL.rank)*0.04;

const expL=(sL.atk*sV.def*1.15)+(formL*0.5)+rankFactor;
const expV=(sV.atk*sL.def)+(formV*0.5);

const total=expL+expV+1.3;

const pL=((expL/total)*100).toFixed(1);
const pV=((expV/total)*100).toFixed(1);
const pE=(100-pL-pV).toFixed(1);

const gT = expL + expV;

/* ---------------- GOLES ---------------- */

const over15 = Math.min(88, Math.max(52, 45 + (gT * 12)));
const over25 = Math.min(68, Math.max(22, 25 + (gT * 14)));

/* ---------------- AMBOS MARCAN ---------------- */

const ambosProb =
Math.min(78,
Math.max(28,
(expL * 0.55 + expV * 0.55) * 35
));

const ambosSi = ambosProb.toFixed(0);
const ambosNo = (100 - ambosSi).toFixed(0);

/* ---------------- CORNERS ---------------- */

let cornersLinea;

if(gT > 2.7) cornersLinea = 8.5;
else if(gT > 2.1) cornersLinea = 8;
else cornersLinea = 7.5;

const probCorners = Math.min(72, Math.max(42, 48 + (gT * 8)));
let rec="Partido parejo";

if(pL>48) rec="Gana "+l;
else if(pV>48) rec="Gana "+v;
else rec="Doble oportunidad";

document.getElementById("resultado").innerHTML=`

<div class="resultado">

<div class="header">

<div class="team">${l}</div>

<div class="vs">VS</div>

<div class="team">${v}</div>

</div>

Victoria Local ${pL}%

<div class="bar"><div class="fill" style="width:${pL}%;background:#22c55e"></div></div>

Empate ${pE}%

<div class="bar"><div class="fill" style="width:${pE}%;background:#64748b"></div></div>

Victoria Visitante ${pV}%

<div class="bar"><div class="fill" style="width:${pV}%;background:#ef4444"></div></div>

<div class="stats">

<div class="mini">
Ambos marcan<br>
<b>SI ${ambosSi}%</b><br>
NO ${ambosNo}%
</div>

<div class="mini">
+1.5 goles<br>
<b>${over15.toFixed(0)}%</b>
<div class="bar">
<div class="fill" style="width:${over15}%;background:#22c55e"></div>
</div>
</div>

<div class="mini">
+2.5 goles<br>
<b>${over25.toFixed(0)}%</b>
<div class="bar">
<div class="fill" style="width:${over25}%;background:#22c55e"></div>
</div>
</div>

<div class="mini">
Corners línea<br>
<b>${cornersLinea}</b>
<div class="bar">
<div class="fill" style="width:${probCorners}%;background:#f59e0b"></div>
</div>
${probCorners.toFixed(0)}%
</div>

</div>

<div class="tip">

APUESTA RECOMENDADA<br>
<b>${rec}</b>

</div>

</div>

`;

}

</script>

</body>
</html>
