<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Predictor de Fútbol</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

/* equipos */

.equipos{
display:flex;
justify-content:center;
align-items:center;
gap:25px;
flex-wrap:wrap;
}

.equipo{
display:flex;
flex-direction:column;
align-items:center;
}

.vs{
font-size:22px;
font-weight:bold;
margin-top:25px;
}

/* selects */

select{
padding:10px;
border-radius:8px;
border:none;
margin-top:5px;
}

/* boton */

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

/* resultado */

.resultado{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:12px;
width:340px;
margin-left:auto;
margin-right:auto;
}

/* barras */

.bar{
background:#334155;
height:10px;
border-radius:10px;
overflow:hidden;
margin-bottom:12px;
}

.fill{
background:#22c55e;
height:100%;
}

/* movil */

@media(max-width:600px){

.equipos{
flex-direction:column;
}

.vs{
margin:10px 0;
}

}

</style>
</head>

<body>

<h1>⚽ Predictor de Fútbol</h1>

<h3>Selecciona Liga</h3>

<select id="liga">

<option value="">-- Selecciona Liga --</option>

<option value="premier">Premier League</option>
<option value="laliga">La Liga</option>
<option value="seriea">Serie A</option>
<option value="bundesliga">Bundesliga</option>

</select>

<br><br>

<div class="equipos">

<div class="equipo">

<label>Equipo Local</label>
<select id="local"></select>

</div>

<div class="vs">VS</div>

<div class="equipo">

<label>Equipo Visitante</label>
<select id="visitante"></select>

</div>

</div>

<button onclick="calcular()">Calcular Predicción</button>

<div class="resultado" id="resultado"></div>

<script>

/* ligas */

const ligas={

premier:[
"Manchester City",
"Arsenal",
"Liverpool",
"Chelsea",
"Manchester United",
"Tottenham"
],

laliga:[
"Real Madrid",
"Barcelona",
"Atletico Madrid",
"Sevilla",
"Valencia"
],

seriea:[
"Inter",
"Milan",
"Juventus",
"Napoli",
"Roma"
],

bundesliga:[
"Bayern Munich",
"Borussia Dortmund",
"Leipzig",
"Leverkusen"
]

}

/* selects */

const ligaSelect=document.getElementById("liga")
const localSelect=document.getElementById("local")
const visitanteSelect=document.getElementById("visitante")

ligaSelect.addEventListener("change",cargarEquipos)

function cargarEquipos(){

const liga=ligaSelect.value

localSelect.innerHTML=""
visitanteSelect.innerHTML=""

if(!ligas[liga]) return

ligas[liga].forEach(eq=>{

let op1=document.createElement("option")
op1.value=eq
op1.text=eq
localSelect.appendChild(op1)

let op2=document.createElement("option")
op2.value=eq
op2.text=eq
visitanteSelect.appendChild(op2)

})

}

/* calculo */

function calcular(){

const local=localSelect.value
const visitante=visitanteSelect.value

if(!local || !visitante){
alert("Selecciona equipos")
return
}

if(local==visitante){
alert("Equipos deben ser diferentes")
return
}

/* fuerza equipos */

let fuerzaLocal=Math.random()*1.5+1
let fuerzaVisita=Math.random()*1.5+1

let total=fuerzaLocal+fuerzaVisita

let probLocal=((fuerzaLocal/total)*100).toFixed(1)
let probVisita=((fuerzaVisita/total)*100).toFixed(1)
let empate=(100-probLocal-probVisita).toFixed(1)

/* goles esperados */

let goles=((fuerzaLocal+fuerzaVisita)/2+Math.random()).toFixed(2)

/* probabilidades over */

let over15
let over25

if(goles>=3){

over15=85+Math.random()*10
over25=65+Math.random()*15

}

else if(goles>=2){

over15=70+Math.random()*15
over25=45+Math.random()*15

}

else{

over15=40+Math.random()*20
over25=20+Math.random()*15

}

over15=over15.toFixed(0)
over25=over25.toFixed(0)

/* ambos marcan */

let ambos=(50+Math.random()*40).toFixed(0)

/* corners */

let corners=(7+Math.random()*5).toFixed(1)

/* resultado */

document.getElementById("resultado").innerHTML=`

<h2>${local} vs ${visitante}</h2>

<p>Local ${probLocal}%</p>
<div class="bar"><div class="fill" style="width:${probLocal}%"></div></div>

<p>Empate ${empate}%</p>
<div class="bar"><div class="fill" style="width:${empate}%"></div></div>

<p>Visita ${probVisita}%</p>
<div class="bar"><div class="fill" style="width:${probVisita}%"></div></div>

<hr>

<p>⚽ Goles esperados: <b>${goles}</b></p>

<p>📈 Over 1.5 goles: <b>${over15}%</b></p>
<p>📈 Over 2.5 goles: <b>${over25}%</b></p>

<hr>

<p>🔥 Ambos marcan: <b>${ambos}%</b></p>

<p>🚩 Corners estimados: <b>${corners}</b></p>

`

}

</script>

</body>
</html>
```
