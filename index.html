<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predictor PRO ELITE v8.5</title>
    <meta name="theme-color" content="#020617">
    <link rel="manifest" href="manifest.json">

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5323/5323977.png">

<body>

<div class="container">
    <h1>⚽ PREDICTOR ELITE</h1>

    <div class="selector-card">
        <label>LIGA / COMPETICIÓN</label>

                <option value="78">Bundesliga 🇩🇪</option>
                <option value="61">Ligue 1 🇫🇷</option>
            </optgroup>
            <optgroup label="América">
                <option value="239">Liga BetPlay 🇨🇴</option>
                <option value="71">Brasileirão 🇧🇷</option>
                <option value="128">Liga Argentina 🇦🇷</option>
                <option value="262">Liga MX 🇲🇽</option>
                <option value="253">Major League Soccer 🇺🇸</option>
            </optgroup>
        </select>

        <label>LOCAL</label>
        <select id="local"><option>Elige una liga...</option></select>
        
        <label>VISITANTE</label>
        <select id="visitante"><option>Elige una liga...</option></select>

        <button onclick="calcularTodo()">GENERAR PRONÓSTICO</button>
    </div>

    <div id="resultado" class="resultado-container"></div>
</div>

<script src="app.js"></script>
