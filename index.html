<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor PRO - Auto Update</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; --text-main: #f8fafc; --text-dim: #94a3b8; --border: #334155; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text-main); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--accent); margin-bottom: 5px; }
        .subtitle { color: var(--text-dim); font-size: 12px; margin-bottom: 20px; }
        .selector-container { background: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        label { display: block; font-size: 10px; color: var(--accent); margin: 10px 0 5px; font-weight: bold; }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid var(--border); margin-bottom: 10px; }
        button { width: 100%; max-width: 400px; padding: 15px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .resultado { margin-top: 20px; background: var(--card); border-radius: 15px; width: 100%; max-width: 400px; padding: 20px; border: 1px solid var(--border); }
        .prob-row { margin-bottom: 10px; }
        .bar-bg { background: #0f172a; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .bar-fill { height: 100%; transition: width 1s; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .card-mini { background: #0f172a; padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

    <h1>⚽ Predictor PRO</h1>
    <div class="subtitle">DATOS EN TIEMPO REAL</div>

    <div class="selector-container">
        <label>Liga</label>
        <select id="liga">
            <option value="">Seleccione Liga</option>
            <option value="premier">Premier League</option>
            <option value="laliga">La Liga</option>
            <option value="betplay">Liga BetPlay (COL)</option>
            <option value="seriea">Serie A</option>
            <option value="bundesliga">Bundesliga</option>
        </select>

        <label>Local</label>
        <select id="local"><option>Esperando liga...</option></select>
        
        <label>Visitante</label>
        <select id="visitante"><option>Esperando liga...</option></select>
    </div>

    <button onclick="calcular()">CALCULAR PREDICCIÓN</button>

    <div id="contenedor-resultado" style="width: 100%;"></div>

    <script>
        const API_KEY = 'ea232d851cb4197391464e2c61df516b';
        let statsDinamicas = {};
        const ligasIDs = { premier: 39, laliga: 140, betplay: 71, seriea: 135, bundesliga: 78 };

        async function cargarDatosLiga(ligaId) {
            const url = `https://v3.football.api-sports.io/standings?league=${ligaId}&season=2024`;
            try {
                const res = await fetch(url, {
                    method: "GET",
                    headers: { "x-rapidapi-host": "v3.football.api-sports.io", "x-rapidapi-key": API_KEY }
                });
                const data = await res.json();
                const standings = data.response[0].league.standings[0];
                
                document.getElementById("local").innerHTML = "";
                document.getElementById("visitante").innerHTML = "";
                statsDinamicas = {};

                standings.forEach(item => {
                    const name = item.team.name;
                    const pj = item.all.played || 1;
                    statsDinamicas[name] = {
                        atk: (item.all.goals.for / pj).toFixed(2),
                        def: (item.all.goals.against / pj).toFixed(2)
                    };
                    document.getElementById("local").add(new Option(name, name));
                    document.getElementById("visitante").add(new Option(name, name));
                });
                alert("Datos de la liga actualizados");
            } catch (e) { alert("Error al cargar datos"); }
        }

        document.getElementById("liga").onchange = function() {
            if(this.value) cargarDatosLiga(ligasIDs[this.value]);
        };

        function calcular() {
            const loc = document.getElementById("local").value;
            const vis = document.getElementById("visitante").value;
            if(!statsDinamicas[loc]) return;

            const sL = statsDinamicas[loc];
            const sV = statsDinamicas[vis];
            const expL = (sL.atk * sV.def * 1.15);
            const expV = (sV.atk * sL.def);
            const total = expL + expV + 1.2;

            const pL = ((expL / total) * 100).toFixed(1);
            const pV = ((expV / total) * 100).toFixed(1);
            const pE = (100 - pL - pV).toFixed(1);

            document.getElementById("contenedor-resultado").innerHTML = `
                <div class="resultado">
                    <div style="text-align:center; font-weight:bold; margin-bottom:15px;">${loc} VS ${vis}</div>
                    <div class="prob-row">Victoria Local: ${pL}% <div class="bar-bg"><div class="bar-fill" style="width:${pL}%; background:#22c55e;"></div></div></div>
                    <div class="prob-row">Empate: ${pE}% <div class="bar-bg"><div class="bar-fill" style="width:${pE}%; background:#64748b;"></div></div></div>
                    <div class="prob-row">Victoria Visita: ${pV}% <div class="bar-bg"><div class="bar-fill" style="width:${pV}%; background:#ef4444;"></div></div></div>
                    <div class="grid-stats">
                        <div class="card-mini">Goles +1.5<br><strong>${Math.min(99, (expL+expV)*40).toFixed(0)}%</strong></div>
                        <div class="card-mini">Córners Est.<br><strong>${Math.floor(8 + (expL+expV))}</strong></div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
