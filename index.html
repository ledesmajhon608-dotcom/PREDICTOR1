<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor PRO - Algoritmo Estadístico</title>

    <style>
        body{
            font-family: 'Segoe UI', Arial, sans-serif;
            background:#0f172a;
            color:white;
            text-align:center;
            padding:20px;
        }

        h1{ color:#22c55e; margin-bottom: 5px; }

        .equipos{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:20px;
            flex-wrap:wrap;
            margin-top: 20px;
        }

        .equipo{
            display:flex;
            flex-direction:column;
            align-items:center;
            width: 150px;
        }

        .vs{ font-size:22px; font-weight:bold; color: #64748b; margin-top: 10px; }

        select{
            padding:10px;
            border-radius:8px;
            border: 1px solid #334155;
            margin-top:5px;
            background: #1e293b;
            color: white;
            width: 100%;
            cursor: pointer;
        }

        button{
            margin-top:30px;
            padding:15px 25px;
            border:none;
            border-radius:8px;
            background:#22c55e;
            color:white;
            font-size:16px;
            cursor:pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #16a34a; transform: translateY(-2px); }

        .resultado{
            margin-top:30px;
            background:#1e293b;
            padding:20px;
            border-radius:15px;
            width:100%;
            max-width:380px;
            margin-left:auto;
            margin-right:auto;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .teams{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .teams img{
            width:55px;
            height:55px;
            object-fit:contain;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
            border-top: 1px solid #334155;
            padding-top: 15px;
        }

        .stat-item { background: #0f172a; padding: 12px; border-radius: 10px; font-size: 13px; }

        .bar{
            background:#334155;
            height:10px;
            border-radius:10px;
            overflow:hidden;
            margin-bottom:12px;
        }

        .fill{
            height:100%;
            transition: width 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .badge {
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: bold;
            color: white;
            display: inline-block;
            margin-top: 5px;
        }

        /* Colores Dinámicos */
        .c-baja { background: #ef4444; }    
        .c-media { background: #eab308; }   
        .c-alta { background: #22c55e; }    

        .text-baja { color: #ef4444; }
        .text-media { color: #eab308; }
        .text-alta { color: #22c55e; }
    </style>
</head>
<body>

<h1>⚽ Predictor PRO</h1>
<p style="color: #94a3b8;">Análisis por Algoritmo de Fuerza Relativa</p>

<div style="max-width: 300px; margin: 0 auto;">
    <label>Competición</label>
    <select id="liga">
        <option value="">-- Selecciona Liga --</option>
        <option value="premier">Premier League</option>
        <option value="laliga">La Liga</option>
        <option value="seriea">Serie A</option>
        <option value="bundesliga">Bundesliga</option>
        <option value="betplay">Liga BetPlay</option>
    </select>
</div>

<div class="equipos">
    <div class="equipo">
        <label>Local</label>
        <select id="local"></select>
    </div>
    <div class="vs">VS</div>
    <div class="equipo">
        <label>Visitante</label>
        <select id="visitante"></select>
    </div>
</div>

<button onclick="calcular()">CALCULAR PREDICCIÓN</button>

<div id="contenedor-resultado"></div>

<script>
// --- DATOS DE EQUIPOS (ATK: Goles a favor, DEF: Goles en contra recibidos de media) ---
// Puedes actualizar estos números cada semana para mayor precisión.
const statsEquipos = {
    // Premier
    "Manchester City": { atk: 2.5, def: 0.9 }, "Liverpool": { atk: 2.3, def: 1.0 },
    "Arsenal": { atk: 2.1, def: 0.8 }, "Manchester United": { atk: 1.4, def: 1.5 },
    "Ipswich Town": { atk: 0.9, def: 1.8 },
    // La Liga
    "Real Madrid": { atk: 2.4, def: 0.8 }, "Barcelona": { atk: 2.6, def: 1.1 },
    // BetPlay
    "Atlético Nacional": { atk: 1.6, def: 1.0 }, "Millonarios": { atk: 1.5, def: 0.9 },
    "Junior": { atk: 1.4, def: 1.2 }, "Santa Fe": { atk: 1.3, def: 0.8 },
    // Valor por defecto para equipos no listados
    "default": { atk: 1.2, def: 1.3 }
};

const ligas={
    premier:["Arsenal","Aston Villa","Bournemouth","Brentford","Brighton","Chelsea","Crystal Palace","Everton","Fulham","Ipswich Town","Leicester City","Liverpool","Manchester City","Manchester United","Newcastle United","Nottingham Forest","Southampton","Tottenham","West Ham","Wolves"],
    laliga:["Real Madrid","Barcelona","Atletico Madrid","Athletic Club","Real Sociedad","Villarreal","Real Betis","Valencia","Sevilla","Girona","Osasuna","Celta Vigo","Alaves","Espanyol","Valladolid","Leganes","Rayo Vallecano","Mallorca","Las Palmas","Getafe"],
    seriea:["Inter","Milan","Juventus","Napoli","Roma","Lazio","Atalanta","Fiorentina","Bologna","Torino","Udinese","Monza","Lecce","Empoli","Cagliari","Genoa","Verona","Como","Parma","Venezia"],
    bundesliga:["Bayern Munich","Borussia Dortmund","RB Leipzig","Bayer Leverkusen","Wolfsburg","Eintracht Frankfurt","Stuttgart","Freiburg","Hoffenheim","Werder Bremen","Augsburg","Bochum","Mainz","Borussia Monchengladbach","Heidenheim","St. Pauli","Holstein Kiel","Union Berlin"],
    betplay:["Atlético Nacional","Millonarios","Santa Fe","América de Cali","Junior","Ind. Medellín","Once Caldas","Deportes Tolima","Deportivo Cali","Pereira","Bucaramanga","La Equidad","Águilas Doradas","Envigado","Alianza","Pasto","Patriotas","Fortaleza","Jaguares","Boyacá Chicó"]
}

const logos={
    "Arsenal":"https://crests.football-data.org/57.png","Manchester City":"https://crests.football-data.org/65.png","Manchester United":"https://crests.football-data.org/66.png","Liverpool":"https://crests.football-data.org/64.png","Ipswich Town":"https://crests.football-data.org/349.png",
    "Real Madrid":"https://crests.football-data.org/86.png","Barcelona":"https://crests.football-data.org/81.png",
    "Atlético Nacional":"https://upload.wikimedia.org/wikipedia/commons/9/9a/Escudo_de_Atl%C3%A9tico_Nacional.png",
    "Millonarios":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Escudo_de_Millonarios_F.C.svg/1200px-Escudo_de_Millonarios_F.C.svg.png",
    "Santa Fe":"https://upload.wikimedia.org/wikipedia/commons/e/e1/Independiente_Santa_Fe_logo.png",
    "América de Cali":"https://upload.wikimedia.org/wikipedia/commons/a/a8/Escudo_de_Am%C3%A9rica_de_Cali.png",
    "Junior":"https://upload.wikimedia.org/wikipedia/commons/d/d3/Escudo_del_Junior_de_Barranquilla.png"
}

const ligaSelect=document.getElementById("liga")
const localSelect=document.getElementById("local")
const visitanteSelect=document.getElementById("visitante")

ligaSelect.addEventListener("change",function(){
    const liga=this.value; localSelect.innerHTML=""; visitanteSelect.innerHTML="";
    if(!ligas[liga]) return;
    ligas[liga].forEach(eq=>{
        let op1=document.createElement("option"); op1.value=eq; op1.text=eq; localSelect.appendChild(op1);
        let op2=document.createElement("option"); op2.value=eq; op2.text=eq; visitanteSelect.appendChild(op2);
    });
});

function getColorClass(val) {
    if (val >= 45) return 'c-alta';
    if (val >= 25) return 'c-media';
    return 'c-baja';
}

function calcular(){
    const loc=localSelect.value; const vis=visitanteSelect.value;
    if(!loc || !vis || loc === vis) return;

    // 1. OBTENER ESTADÍSTICAS (Usa default si el equipo no está en statsEquipos)
    const sL = statsEquipos[loc] || statsEquipos["default"];
    const sV = statsEquipos[vis] || statsEquipos["default"];

    // 2. LÓGICA DE FUERZA (Ataque de uno vs Defensa del otro)
    // El local recibe un bono de +0.3 por ventaja de campo
    let fuerzaLocal = (sL.atk * sV.def) + 0.3;
    let fuerzaVisita = (sV.atk * sL.def);
    
    // Simulación de probabilidad
    let totalFuerza = fuerzaLocal + fuerzaVisita + 1.1; // 1.1 representa el factor empate
    
    let pL = ((fuerzaLocal / totalFuerza) * 100).toFixed(1);
    let pV = ((fuerzaVisita / totalFuerza) * 100).toFixed(1);
    let pE = (100 - pL - pV).toFixed(1);

    // 3. MERCADOS ADICIONALES
    let golesEstimados = (fuerzaLocal + fuerzaVisita) / 2;
    let ambos = (sL.atk > 1.2 && sV.atk > 1.2) ? "SÍ" : (golesEstimados > 1.5 ? "SÍ" : "NO");
    
    // Probabilidades de Over basándose en la fuerza ofensiva combinada
    let p15 = Math.min(98.5, (golesEstimados * 45)).toFixed(1);
    let p25 = Math.min(89.0, (golesEstimados * 30)).toFixed(1);
    let corn = Math.floor(7 + (golesEstimados * 2));

    const imgDef = 'https://upload.wikimedia.org/wikipedia/commons/6/6e/Soccer_ball.svg';

    document.getElementById("contenedor-resultado").innerHTML=`
    <div class="resultado">
        <div class="teams">
            <div><img src="${logos[loc] || imgDef}"><br><small>${loc}</small></div>
            <div class="vs">VS</div>
            <div><img src="${logos[vis] || imgDef}"><br><small>${vis}</small></div>
        </div>

        <div style="text-align: left; font-size: 14px;">
            <p>Local <strong>${pL}%</strong></p>
            <div class="bar"><div class="fill ${getColorClass(pL)}" style="width:0%" id="b1"></div></div>
            <p>Empate <strong>${pE}%</strong></p>
            <div class="bar"><div class="fill ${getColorClass(pE)}" style="width:0%" id="b2"></div></div>
            <p>Visita <strong>${pV}%</strong></p>
            <div class="bar"><div class="fill ${getColorClass(pV)}" style="width:0%" id="b3"></div></div>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><strong>Ambos Marcan</strong><br><span class="badge ${ambos==='SÍ'?'c-alta':'c-baja'}">${ambos}</span></div>
            <div class="stat-item"><strong>Córners</strong><br><span class="badge c-media">${corn}</span></div>
            <div class="stat-item"><strong>Goles +1.5</strong><br><span class="${getColorClass(p15).replace('c-','text-')}">● ${p15}%</span></div>
            <div class="stat-item"><strong>Goles +2.5</strong><br><span class="${getColorClass(p25).replace('c-','text-')}">● ${p25}%</span></div>
        </div>
    </div>
    `;

    setTimeout(() => {
        document.getElementById("b1").style.width = pL + "%";
        document.getElementById("b2").style.width = pE + "%";
        document.getElementById("b3").style.width = pV + "%";
    }, 100);
}
</script>
</body>
</html>
