<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Predictor PRO</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

.equipos{
display:flex;
justify-content:center;
align-items:center;
gap:25px;
flex-wrap:wrap;
}

.equipo{
display:flex;
flex-direction:column;
align-items:center;
}

.vs{
font-size:22px;
font-weight:bold;
margin-top:25px;
}

select{
padding:10px;
border-radius:8px;
border:none;
margin-top:5px;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

.resultado{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:12px;
width:360px;
margin-left:auto;
margin-right:auto;
}

.teams{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.teams img{
width:40px;
}

.bar{
background:#334155;
height:10px;
border-radius:10px;
overflow:hidden;
margin-bottom:12px;
}

.fill{
background:#22c55e;
height:100%;
}

hr{
border:1px solid #334155;
margin:15px 0;
}

@media(max-width:600px){

.equipos{
flex-direction:column;
}

.vs{
margin:10px 0;
}

}

</style>
</head>

<body>

<h1>⚽ Predictor PRO</h1>

<h3>Selecciona Liga</h3>

<select id="liga">

<option value="">-- Selecciona Liga --</option>
<option value="premier">Premier League</option>
<option value="laliga">La Liga</option>
<option value="seriea">Serie A</option>
<option value="bundesliga">Bundesliga</option>
<option value="ligue1">Ligue 1</option>
<option value="mls">MLS</option>
<option value="brasil">Brasileirao</option>
<option value="argentina">Liga Argentina</option>
<option value="colombia">Liga Colombiana</option>
<option value="saudi">Liga Saudí</option>

</select>

<br><br>

<div class="equipos">

<div class="equipo">
<label>Equipo Local</label>
<select id="local"></select>
</div>

<div class="vs">VS</div>

<div class="equipo">
<label>Equipo Visitante</label>
<select id="visitante"></select>
</div>

</div>

<button onclick="calcular()">Calcular Predicción</button>

<div class="resultado" id="resultado"></div>

<script>

/* LIGAS */

const ligas={

premier:[
"Manchester City","Arsenal","Liverpool","Chelsea","Manchester United","Tottenham","Newcastle United","Aston Villa","West Ham","Everton","Brighton","Crystal Palace"
],

laliga:[
"Real Madrid","Barcelona","Atletico Madrid","Athletic Club","Real Sociedad","Villarreal","Real Betis","Valencia","Sevilla","Getafe","Girona"
],

seriea:[
"Inter","Milan","Juventus","Napoli","Roma","Lazio","Atalanta","Fiorentina","Bologna","Torino"
],

bundesliga:[
"Bayern Munich","Borussia Dortmund","RB Leipzig","Bayer Leverkusen","Eintracht Frankfurt","Stuttgart","Union Berlin"
],

ligue1:[
"PSG","Marseille","Monaco","Lyon","Lille","Nice","Lens"
],

mls:[
"Inter Miami","LA Galaxy","Los Angeles FC","Seattle Sounders","Atlanta United","Orlando City","New York City"
],

brasil:[
"Flamengo","Palmeiras","Corinthians","Sao Paulo","Fluminense","Gremio","Internacional"
],

argentina:[
"Boca Juniors","River Plate","Racing","Independiente","San Lorenzo","Rosario Central"
],

colombia:[
"Atletico Nacional","Millonarios","America de Cali","Junior","Santa Fe","Medellin","Deportivo Cali"
],

saudi:[
"Al Nassr","Al Hilal","Al Ittihad","Al Ahli","Al Shabab"
]

}

/* LOGOS */

const logos={

"Manchester City":"https://crests.football-data.org/65.png",
"Arsenal":"https://crests.football-data.org/57.png",
"Liverpool":"https://crests.football-data.org/64.png",
"Chelsea":"https://crests.football-data.org/61.png",
"Manchester United":"https://crests.football-data.org/66.png",
"Tottenham":"https://crests.football-data.org/73.png",

"Real Madrid":"https://crests.football-data.org/86.png",
"Barcelona":"https://crests.football-data.org/81.png",
"Atletico Madrid":"https://crests.football-data.org/78.png",

"Inter":"https://crests.football-data.org/108.png",
"Milan":"https://crests.football-data.org/98.png",
"Juventus":"https://crests.football-data.org/109.png",

"Bayern Munich":"https://crests.football-data.org/5.png",
"Borussia Dortmund":"https://crests.football-data.org/4.png",

"PSG":"https://crests.football-data.org/524.png",

"Inter Miami":"https://upload.wikimedia.org/wikipedia/en/5/5c/Inter_Miami_CF_logo.svg",

"Flamengo":"https://upload.wikimedia.org/wikipedia/commons/9/93/Flamengo-RJ_%28BRA%29.png",
"Palmeiras":"https://upload.wikimedia.org/wikipedia/en/1/10/Palmeiras_logo.svg",

"Boca Juniors":"https://upload.wikimedia.org/wikipedia/commons/4/41/CABJ70.png",
"River Plate":"https://upload.wikimedia.org/wikipedia/en/f/f1/Club_Atl%C3%A9tico_River_Plate_logo.svg",

"Atletico Nacional":"https://upload.wikimedia.org/wikipedia/en/7/7b/Atletico_Nacional.png",
"Millonarios":"https://upload.wikimedia.org/wikipedia/en/3/3a/Millonarios_FC_logo.png",

"Al Nassr":"https://upload.wikimedia.org/wikipedia/en/5/5c/Al_Nassr_FC_logo.png",
"Al Hilal":"https://upload.wikimedia.org/wikipedia/en/a/a2/Al-Hilal_SFC_logo.png"

}

/* FUERZA EQUIPOS */

const fuerzaEquipos={
"Manchester City":95,
"Real Madrid":95,
"Barcelona":92,
"Bayern Munich":94,
"Liverpool":93,
"Inter":91,
"PSG":92,
"Juventus":89,
"Arsenal":90,
"Atletico Madrid":90,
"Milan":89,
"Napoli":88,
"Chelsea":88,
"Flamengo":88,
"Palmeiras":90,
"River Plate":87,
"Boca Juniors":86,
"Atletico Nacional":84,
"Millonarios":83
}

/* SELECTS */

const ligaSelect=document.getElementById("liga")
const localSelect=document.getElementById("local")
const visitanteSelect=document.getElementById("visitante")

ligaSelect.addEventListener("change",cargarEquipos)

function cargarEquipos(){

const liga=ligaSelect.value

localSelect.innerHTML=""
visitanteSelect.innerHTML=""

if(!ligas[liga]) return

ligas[liga].forEach(eq=>{

let op1=document.createElement("option")
op1.value=eq
op1.text=eq
localSelect.appendChild(op1)

let op2=document.createElement("option")
op2.value=eq
op2.text=eq
visitanteSelect.appendChild(op2)

})

}

/* CALCULO */

function calcular(){

const local=localSelect.value
const visitante=visitanteSelect.value

if(!local || !visitante){
alert("Selecciona equipos")
return
}

if(local==visitante){
alert("Equipos deben ser diferentes")
return
}

let fuerzaLocal=fuerzaEquipos[local] || 75
let fuerzaVisita=fuerzaEquipos[visitante] || 75

let golesLocal=(Math.random()*1.5)+(fuerzaLocal/100)
let golesVisita=(Math.random()*1.5)+(fuerzaVisita/100)

let golesTotal=golesLocal+golesVisita

let empate=20+Math.random()*10
let restante=100-empate

let probLocal=(golesLocal/(golesLocal+golesVisita))*restante
let probVisita=(golesVisita/(golesLocal+golesVisita))*restante

probLocal=probLocal.toFixed(1)
probVisita=probVisita.toFixed(1)
empate=empate.toFixed(1)

golesTotal=golesTotal.toFixed(2)

let over15=Math.min(95,(golesTotal/3)*100).toFixed(0)
let over25=Math.min(90,(golesTotal/4)*100).toFixed(0)

let ambos=(golesLocal*golesVisita*20).toFixed(0)
let corners=(8+Math.random()*4).toFixed(1)

/* RESULTADO */

document.getElementById("resultado").innerHTML=`

<div class="teams">

<div>
<img src="${logos[local] || 'https://upload.wikimedia.org/wikipedia/commons/6/6e/Soccer_ball.svg'}"><br>${local}
</div>

<strong>VS</strong>

<div>
<img src="${logos[visitante] || 'https://upload.wikimedia.org/wikipedia/commons/6/6e/Soccer_ball.svg'}"><br>${visitante}
</div>

</div>

<p>Local ${probLocal}%</p>
<div class="bar"><div class="fill" style="width:${probLocal}%"></div></div>

<p>Empate ${empate}%</p>
<div class="bar"><div class="fill" style="width:${empate}%"></div></div>

<p>Visita ${probVisita}%</p>
<div class="bar"><div class="fill" style="width:${probVisita}%"></div></div>

<hr>

<p>⚽ Goles esperados: <b>${golesTotal}</b></p>

<p>📈 Over 1.5 goles: <b>${over15}%</b></p>
<p>📈 Over 2.5 goles: <b>${over25}%</b></p>

<hr>

<p>🔥 Ambos marcan: <b>${ambos}%</b></p>

<p>🚩 Corners estimados: <b>${corners}</b></p>

`

}

</script>

</body>
</html>
