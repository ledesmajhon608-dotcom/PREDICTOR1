<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predictor PRO - Logos Reparados</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #22c55e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--accent); font-size: 28px; margin: 10px 0 5px 0; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 25px; }

        .selector-container {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        label { display: block; text-align: left; font-size: 11px; font-weight: bold; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: #0f172a;
            color: white;
            border: 1px solid var(--border);
            font-size: 16px;
            margin-bottom: 15px;
            appearance: none;
        }

        .matchup { display: grid; grid-template-columns: 1fr 40px 1fr; align-items: center; gap: 10px; }
        .vs-badge { background: var(--border); padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 15px;}

        button {
            width: 100%;
            max-width: 400px;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.4);
            cursor: pointer;
        }

        .resultado {
            margin-top: 25px;
            background: var(--card);
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid var(--border);
        }

        .header-teams { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .team-box img { width: 65px; height: 65px; object-fit: contain; background: rgba(255,255,255,0.05); border-radius: 50%; padding: 5px; }
        .team-box span { display: block; font-size: 13px; font-weight: bold; margin-top: 8px; }

        .prob-row { margin-bottom: 12px; }
        .prob-info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
        .bar-bg { background: #0f172a; height: 10px; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 1s ease-in-out; }

        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card-mini { background: #0f172a; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #1e293b; }
        .card-mini small { color: var(--text-dim); font-size: 10px; text-transform: uppercase; }
        .card-mini div { font-size: 16px; font-weight: bold; margin-top: 3px; }

        .tip-container { margin-top: 15px; background: rgba(34, 197, 94, 0.1); border: 1px dashed var(--accent); border-radius: 15px; padding: 15px; text-align: left; }
        .tip-header { color: var(--accent); font-weight: bold; font-size: 14px; }
        .tip-content { font-size: 15px; margin-top: 5px; color: var(--text-main); font-weight: 500; }
    </style>
</head>
<body>

    <h1>⚽ Predictor PRO</h1>
    <div class="subtitle">Logos & Smart Tips</div>

    <div class="selector-container">
        <label>Competición</label>
        <select id="liga">
            <option value="">Seleccionar Liga</option>
            <option value="premier">Premier League</option>
            <option value="laliga">La Liga</option>
            <option value="betplay">Liga BetPlay</option>
            <option value="seriea">Serie A</option>
            <option value="bundesliga">Bundesliga</option>
        </select>

        <div class="matchup">
            <div><label>Local</label><select id="local"></select></div>
            <div class="vs-badge">VS</div>
            <div><label>Visita</label><select id="visitante"></select></div>
        </div>
    </div>

    <button onclick="calcular()">OBTENER PREDICCIÓN</button>

    <div id="contenedor-resultado" style="width: 100%;"></div>

<script>
// IDs de football-data para automatizar logos europeos
const idLogos = {
    "Arsenal": 57, "Aston Villa": 58, "Chelsea": 61, "Liverpool": 64, "Manchester City": 65, "Manchester United": 66,
    "Tottenham": 73, "Real Madrid": 86, "Barcelona": 81, "Atletico Madrid": 78, "Sevilla": 559, "Inter": 108,
    "Milan": 98, "Juventus": 109, "Napoli": 113, "Lazio": 110, "Fiorentina": 99, "Bayern Munich": 5, "Borussia Dortmund": 4
};

// Logos manuales para Liga BetPlay
const logosManuales = {
    "Atlético Nacional": "https://upload.wikimedia.org/wikipedia/commons/9/9a/Escudo_de_Atl%C3%A9tico_Nacional.png",
    "Millonarios": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Escudo_de_Millonarios_F.C.svg/1200px-Escudo_de_Millonarios_F.C.svg.png",
    "Santa Fe": "https://upload.wikimedia.org/wikipedia/commons/e/e1/Independiente_Santa_Fe_logo.png",
    "América de Cali": "https://upload.wikimedia.org/wikipedia/commons/a/a8/Escudo_de_Am%C3%A9rica_de_Cali.png",
    "Junior": "https://upload.wikimedia.org/wikipedia/commons/d/d3/Escudo_del_Junior_de_Barranquilla.png"
};

const statsEquipos = {
    "Arsenal": { atk: 2.3, def: 0.8 }, "Manchester City": { atk: 2.5, def: 1.0 }, "Real Madrid": { atk: 2.4, def: 0.8 }, 
    "Lazio": { atk: 1.6, def: 1.1 }, "Fiorentina": { atk: 1.7, def: 1.2 }, "default": { atk: 1.2, def: 1.4 }
};

const ligas={
    premier:["Arsenal","Aston Villa","Bournemouth","Brentford","Brighton","Chelsea","Crystal Palace","Everton","Fulham","Ipswich Town","Leicester City","Liverpool","Manchester City","Manchester United","Newcastle United","Nottingham Forest","Southampton","Tottenham","West Ham","Wolves"],
    laliga:["Real Madrid","Barcelona","Atletico Madrid","Athletic Club","Real Sociedad","Villarreal","Real Betis","Valencia","Sevilla","Girona","Osasuna","Celta Vigo","Alaves","Espanyol","Valladolid","Leganes","Rayo Vallecano","Mallorca","Las Palmas","Getafe"],
    betplay:["Atlético Nacional","Millonarios","Santa Fe","América de Cali","Junior","Ind. Medellín","Once Caldas","Deportes Tolima","Deportivo Cali","Pereira","Bucaramanga","La Equidad","Águilas Doradas","Envigado","Alianza","Pasto","Patriotas","Fortaleza","Jaguares","Boyacá Chicó"],
    seriea:["Inter","Milan","Juventus","Napoli","Roma","Lazio","Atalanta","Fiorentina","Bologna","Torino","Udinese","Monza","Lecce","Empoli","Cagliari","Genoa","Verona","Como","Parma","Venezia"],
    bundesliga:["Bayern Munich","Borussia Dortmund","RB Leipzig","Bayer Leverkusen","Wolfsburg","Eintracht Frankfurt","Stuttgart","Freiburg"]
}

const ligaSelect=document.getElementById("liga");
const localSelect=document.getElementById("local");
const visitanteSelect=document.getElementById("visitante");

ligaSelect.addEventListener("change",function(){
    const liga=this.value; localSelect.innerHTML=""; visitanteSelect.innerHTML="";
    if(!ligas[liga]) return;
    ligas[liga].forEach(eq=>{
        localSelect.add(new Option(eq, eq));
        visitanteSelect.add(new Option(eq, eq));
    });
});

function getLogoURL(nombre) {
    if (logosManuales[nombre]) return logosManuales[nombre];
    if (idLogos[nombre]) return `https://crests.football-data.org/${idLogos[nombre]}.png`;
    return 'https://upload.wikimedia.org/wikipedia/commons/6/6e/Soccer_ball.svg'; 
}

function calcular(){
    const loc=localSelect.value; const vis=visitanteSelect.value;
    if(!loc || !vis || loc === vis) return;

    const sL = statsEquipos[loc] || statsEquipos["default"];
    const sV = statsEquipos[vis] || statsEquipos["default"];

    let expL = (sL.atk * sV.def * 1.15);
    let expV = (sV.atk * sL.def);
    let total = expL + expV + 1.2; 
    
    let pL = ((expL / total) * 100).toFixed(1);
    let pV = ((expV / total) * 100).toFixed(1);
    let pE = (100 - pL - pV).toFixed(1);

    document.getElementById("contenedor-resultado").innerHTML = `
        <div class="resultado">
            <div class="header-teams">
                <div class="team-box">
                    <img src="${getLogoURL(loc)}" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/6/6e/Soccer_ball.svg'">
                    <span>${loc}</span>
                </div>
                <div class="vs-badge">VS</div>
                <div class="team-box">
                    <img src="${getLogoURL(vis)}" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/6/6e/Soccer_ball.svg'">
                    <span>${vis}</span>
                </div>
            </div>

            <div class="prob-row">
                <div class="prob-info"><span>Victoria Local</span><strong>${pL}%</strong></div>
                <div class="bar-bg"><div id="b1" class="bar-fill" style="width:0%; background:#22c55e;"></div></div>
            </div>
            <div class="prob-row">
                <div class="prob-info"><span>Empate</span><strong>${pE}%</strong></div>
                <div class="bar-bg"><div id="b2" class="bar-fill" style="width:0%; background:#64748b;"></div></div>
            </div>
            <div class="prob-row">
                <div class="prob-info"><span>Victoria Visita</span><strong>${pV}%</strong></div>
                <div class="bar-bg"><div id="b3" class="bar-fill" style="width:0%; background:#ef4444;"></div></div>
            </div>

            <div class="grid-stats">
                <div class="card-mini"><small>Ambos Marcan</small><div>${(expL>0.9&&expV>0.9)?'SÍ':'NO'}</div></div>
                <div class="card-mini"><small>Córners Est.</small><div>${Math.floor(7+(expL+expV)*1.5)}</div></div>
                <div class="card-mini"><small>Goles +1.5</small><div>${Math.min(99, (expL+expV)*40).toFixed(1)}%</div></div>
                <div class="card-mini"><small>Goles +2.5</small><div>${Math.min(90, (expL+expV)*25).toFixed(1)}%</div></div>
            </div>
        </div>
    `;

    setTimeout(() => {
        document.getElementById("b1").style.width = pL + "%";
        document.getElementById("b2").style.width = pE + "%";
        document.getElementById("b3").style.width = pV + "%";
    }, 100);
}
</script>
</body>
</html>
