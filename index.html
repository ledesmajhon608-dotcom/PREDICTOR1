<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor 2026 Ultra</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #00ff66; --text: #fff; --border: #222; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; }
        button { background: var(--accent); color: #000; font-weight: bold; border: none; cursor: pointer; font-size: 16px; }
        .status { font-size: 11px; text-align: center; margin-top: 10px; color: #888; }
        .res { margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 12px; display: none; }
        .badge { background: #222; padding: 3px 8px; border-radius: 5px; font-size: 10px; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--accent)">PRO PREDICTOR v3</h2>
    
    <div class="card">
        <label style="font-size: 12px;">SELECCIONAR LIGA</label>
        <select id="liga">
            <option value="">Selecciona...</option>
            <option value="39">Premier League 🏴󠁧󠁢󠁥󠁮󠁧󠁿</option>
            <option value="140">La Liga 🇪🇸</option>
            <option value="135">Serie A 🇮🇹</option>
            <option value="78">Bundesliga 🇩🇪</option>
            <option value="239">Liga BetPlay 🇨🇴</option>
            <option value="71">Brasileirão 🇧🇷</option>
        </select>
        
        <div id="info" class="status">Esperando selección...</div>

        <label style="font-size: 12px; margin-top:15px; display:block;">EQUIPOS</label>
        <select id="local"></select>
        <select id="visitante"></select>

        <button onclick="predecir()">CALCULAR ACIERTO</button>
    </div>

    <div id="resultado" class="res"></div>
</div>

<script>
const KEY = "ea232d851cb4197391464e2c61df516b";
const URL = "https://v3.football.api-sports.io/standings";
let db = {};

document.getElementById('liga').onchange = async function() {
    const id = this.value;
    const info = document.getElementById('info');
    info.innerHTML = "🔄 Buscando datos 2026/2025...";
    
    // Lista de temporadas: 2025 es la actual para ligas europeas (25/26) 
    // y 2026 para ligas latinas que inician año.
    const años = [2026, 2025, 2024];
    let exito = false;

    for(let a of años) {
        try {
            const r = await fetch(`${URL}?league=${id}&season=${a}`, {
                headers: { "x-rapidapi-key": KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
            });
            const d = await r.json();

            if(d.response && d.response.length > 0) {
                cargarEquipos(d.response[0].league.standings[0]);
                info.innerHTML = `<span class="badge">TEMPORADA ${a} DETECTADA</span>`;
                exito = true;
                break;
            }
        } catch(e) {}
    }
    if(!exito) info.innerHTML = "❌ No hay datos en esta API.";
};

function cargarEquipos(data) {
    db = {};
    const l = document.getElementById('local');
    const v = document.getElementById('visitante');
    l.innerHTML = v.innerHTML = "";
    
    data.forEach(t => {
        db[t.team.name] = {
            hAtk: (t.home.goals.for / t.home.played) || 0,
            hDef: (t.home.goals.against / t.home.played) || 0,
            aAtk: (t.away.goals.for / t.away.played) || 0,
            aDef: (t.away.goals.against / t.away.played) || 0,
            form: t.form || "DDDDD"
        };
        l.add(new Option(t.team.name, t.team.name));
        v.add(new Option(t.team.name, t.team.name));
    });
}

function predecir() {
    const nL = document.getElementById('local').value;
    const nV = document.getElementById('visitante').value;
    if(!nL || nL === nV) return;

    const L = db[nL]; const V = db[nV];
    
    // Poisson simple ajustado
    let xL = (L.hAtk * V.aDef * 1.2);
    let xV = (V.aAtk * L.hDef * 0.9);

    let total = xL + xV + 0.5;
    let pL = ((xL / total) * 100).toFixed(1);
    let pV = ((xV / total) * 100).toFixed(1);
    let pE = (100 - pL - pV).toFixed(1);

    const res = document.getElementById('resultado');
    res.style.display = "block";
    res.innerHTML = `
        <div style="text-align:center; margin-bottom:10px;"><b>${nL} vs ${nV}</b></div>
        <div style="font-size:14px;">
            Local: ${pL}% | Empate: ${pE}% | Vis: ${pV}%
        </div>
        <div style="margin-top:10px; color:var(--accent); font-weight:bold; border-top:1px solid #333; pt-10px">
            Sugerencia: ${pL > 50 ? '1X (Local o Empate)' : pV > 50 ? 'X2 (Visita o Empate)' : 'Menos de 2.5 goles'}
        </div>
    `;
}
</script>
</body>
</html>
