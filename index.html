}

/* boton */

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

/* resultado */

.resultado{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:12px;
width:360px;
margin-left:auto;
margin-right:auto;
}

/* logos */

.teams{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.teams img{
width:40px;
}

/* barras */

.bar{
background:#334155;
height:10px;
border-radius:10px;
overflow:hidden;
margin-bottom:12px;
}

.fill{
background:#22c55e;
height:100%;
}

/* movil */

@media(max-width:600px){

.equipos{
flex-direction:column;
}

.vs{
margin:10px 0;
}

}

</style>
