<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Predictor de Fútbol</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

/* selects y boton */

select,button{
padding:10px;
margin:10px;
font-size:16px;
border-radius:8px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

/* contenedor equipos */

.equipos{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
flex-wrap:wrap;
margin-top:10px;
}

.equipo{
display:flex;
flex-direction:column;
align-items:center;
}

.vs{
font-size:22px;
font-weight:bold;
margin-top:25px;
}

/* resultado */

.resultado{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:10px;
display:block;
width:320px;
margin-left:auto;
margin-right:auto;
}

hr{
border:1px solid #334155;
}

/* móvil */

@media(max-width:600px){

.equipos{
flex-direction:column;
}

.vs{
margin:10px 0;
}

}

</style>
</head>

<body>

<h1>⚽ Predictor de Fútbol</h1>

<h3>Selecciona Liga</h3>

<select id="liga">

<option value="">-- Selecciona Liga --</option>

<option value="premier">Premier League</option>
<option value="laliga">La Liga</option>
<option value="seriea">Serie A</option>
<option value="bundesliga">Bundesliga</option>
<option value="ligue1">Ligue 1</option>
<option value="brasil">Brasileirão</option>
<option value="argentina">Liga Argentina</option>
<option value="mls">MLS</option>

</select>

<br>

<div class="equipos">

<div class="equipo">

<h3>Equipo Local</h3>
<select id="local"></select>

</div>

<div class="vs">VS</div>

<div class="equipo">

<h3>Equipo Visitante</h3>
<select id="visitante"></select>

</div>

</div>

<br>

<button onclick="calcular()">Calcular Predicción</button>

<div class="resultado" id="resultado"></div>

<script>

const ligas = {

premier:[
"Manchester City",
"Arsenal",
"Liverpool",
"Chelsea",
"Manchester United",
"Tottenham"
],

laliga:[
"Real Madrid",
"Barcelona",
"Atletico Madrid",
"Sevilla",
"Real Sociedad",
"Valencia"
],

seriea:[
"Inter",
"Milan",
"Juventus",
"Napoli",
"Roma",
"Lazio"
],

bundesliga:[
"Bayern Munich",
"Borussia Dortmund",
"Leipzig",
"Leverkusen",
"Wolfsburg"
],

ligue1:[
"PSG",
"Marseille",
"Monaco",
"Lyon",
"Lille"
],

brasil:[
"Flamengo",
"Palmeiras",
"Santos",
"Corinthians",
"Sao Paulo"
],

argentina:[
"Boca Juniors",
"River Plate",
"Racing",
"Independiente",
"San Lorenzo"
],

mls:[
"Inter Miami",
"LA Galaxy",
"LAFC",
"Atlanta United",
"New York City"
]

};

const ligaSelect = document.getElementById("liga");
const localSelect = document.getElementById("local");
const visitanteSelect = document.getElementById("visitante");

ligaSelect.addEventListener("change", cargarEquipos);

function cargarEquipos(){

const liga = ligaSelect.value;

localSelect.innerHTML="";
visitanteSelect.innerHTML="";

if(!ligas[liga]) return;

ligas[liga].forEach(equipo=>{

let op1=document.createElement("option");
op1.value=equipo;
op1.text=equipo;
localSelect.appendChild(op1);

let op2=document.createElement("option");
op2.value=equipo;
op2.text=equipo;
visitanteSelect.appendChild(op2);

});

}

function calcular(){

const local=localSelect.value;
const visitante=visitanteSelect.value;

if(!local || !visitante){
alert("Selecciona los equipos");
return;
}

if(local==visitante){
alert("Selecciona equipos diferentes");
return;
}

/* Probabilidades */

const probLocal=(Math.random()*40+40).toFixed(1);
const empate=(Math.random()*25).toFixed(1);
const probVisita=(100-probLocal).toFixed(1);

/* Goles esperados */

const golesEsperados=(Math.random()*3+1).toFixed(2);

/* Over */

const over15=(Math.random()*100).toFixed(0);
const over25=(Math.random()*100).toFixed(0);

/* Ambos marcan */

const ambos=(Math.random()*100).toFixed(0);

/* Corners */

const corners=(Math.random()*6+7).toFixed(1);

document.getElementById("resultado").innerHTML=`

<h2>${local} vs ${visitante}</h2>

<p>🏠 Local: <b>${probLocal}%</b></p>
<p>🤝 Empate: <b>${empate}%</b></p>
<p>✈️ Visita: <b>${probVisita}%</b></p>

<hr>

<p>⚽ Goles esperados: <b>${golesEsperados}</b></p>

<p>📈 Over 1.5 goles: <b>${over15}%</b></p>
<p>📈 Over 2.5 goles: <b>${over25}%</b></p>

<hr>

<p>🔥 Ambos marcan: <b>${ambos}%</b></p>

<p>🚩 Corners estimados: <b>${corners}</b></p>

`;

}

</script>

</body>
</html>
```
