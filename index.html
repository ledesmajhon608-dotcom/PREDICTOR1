<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predictor PRO - Global</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #22c55e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--accent); font-size: 26px; margin: 10px 0 5px 0; }
        .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }

        .selector-container {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        label { display: block; text-align: left; font-size: 11px; font-weight: bold; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }

        select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: #0f172a;
            color: white;
            border: 1px solid var(--border);
            font-size: 16px;
            margin-bottom: 15px;
            appearance: none;
        }

        .matchup { display: grid; grid-template-columns: 1fr 40px 1fr; align-items: center; gap: 10px; }
        .vs-divider { color: var(--text-dim); font-weight: bold; font-size: 14px; margin-top: 15px; text-align: center; }

        button {
            width: 100%;
            max-width: 400px;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.4);
            cursor: pointer;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.98); }

        .resultado {
            margin-top: 25px;
            background: var(--card);
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            box-sizing: border-box;
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header-text {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .team-display { flex: 1; text-align: center; }
        .team-name { font-size: 16px; font-weight: 800; color: var(--text-main); display: block; }
        .team-label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: bold; margin-bottom: 4px; display: block; }

        .vs-circle { background: var(--bg); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: var(--text-dim); border: 1px solid var(--border); margin: 0 10px; flex-shrink: 0; }

        .prob-row { margin-bottom: 15px; }
        .prob-info { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
        .bar-bg { background: #0f172a; height: 12px; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 1s ease-in-out; }

        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .card-mini { background: #0f172a; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #1e293b; }
        .card-mini small { color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
        .card-mini div { font-size: 18px; font-weight: bold; margin-top: 5px; }

        .tip-box {
            margin-top: 20px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px dashed var(--accent);
            border-radius: 15px;
            padding: 15px;
        }
        .tip-title { color: var(--accent); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .tip-text { font-size: 16px; font-weight: 600; color: var(--text-main); }
    </style>
</head>
<body>

    <h1>⚽ Predictor PRO</h1>
    <div class="subtitle">Multi-Liga Analytics</div>

    <div class="selector-container">
        <label>Competición</label>
        <select id="liga">
            <option value="">Seleccionar Liga</option>
            <option value="premier">Premier League</option>
            <option value="laliga">La Liga</option>
            <option value="betplay">Liga BetPlay</option>
            <option value="seriea">Serie A</option>
            <option value="bundesliga">Bundesliga</option>
            <option value="ligue1">Ligue 1 (Francia)</option>
            <option value="mls">MLS (USA)</option>
        </select>

        <div class="matchup">
            <div><label>Local</label><select id="local"></select></div>
            <div class="vs-divider">VS</div>
            <div><label>Visitante</label><select id="visitante"></select></div>
        </div>
    </div>

    <button onclick="calcular()">CALCULAR PREDICCIÓN</button>

    <div id="contenedor-resultado" style="width: 100%;"></div>

<script>
const statsEquipos = {
    // Francia - Ligue 1
    "PSG": { atk: 2.5, def: 0.9 }, "Monaco": { atk: 1.9, def: 1.1 }, "Marseille": { atk: 1.8, def: 1.2 }, "Lille": { atk: 1.6, def: 1.0 }, "Lyon": { atk: 1.8, def: 1.4 }, "Lens": { atk: 1.5, def: 1.0 }, "Nice": { atk: 1.4, def: 0.9 },
    // USA - MLS
    "Inter Miami": { atk: 2.3, def: 1.4 }, "LAFC": { atk: 2.0, def: 1.1 }, "LA Galaxy": { atk: 2.1, def: 1.3 }, "Columbus Crew": { atk: 1.9, def: 1.0 }, "Seattle Sounders": { atk: 1.6, def: 1.0 }, "Cincinnati": { atk: 1.7, def: 1.1 },
    // Europa Famosos
    "Real Madrid": { atk: 2.4, def: 0.8 }, "Barcelona": { atk: 2.6, def: 1.1 }, "Man. City": { atk: 2.5, def: 1.0 }, "Arsenal": { atk: 2.3, def: 0.8 }, "Liverpool": { atk: 2.4, def: 0.9 },
    // Colombia
    "Atlético Nacional": { atk: 1.6, def: 1.0 }, "Millonarios": { atk: 1.5, def: 0.9 }, "Santa Fe": { atk: 1.4, def: 0.8 }, "América de Cali": { atk: 1.5, def: 1.1 },
    "default": { atk: 1.2, def: 1.3 }
};

const ligas = {
    premier: ["Arsenal","Aston Villa","Bournemouth","Brentford","Brighton","Chelsea","Crystal Palace","Everton","Fulham","Ipswich Town","Leicester City","Liverpool","Man. City","Manchester United","Newcastle United","Nottingham Forest","Southampton","Tottenham","West Ham","Wolves"],
    laliga: ["Real Madrid","Barcelona","Atletico Madrid","Athletic Club","Real Sociedad","Villarreal","Real Betis","Valencia","Sevilla","Girona","Osasuna","Celta Vigo","Alaves","Espanyol","Valladolid","Leganes","Rayo Vallecano","Mallorca","Las Palmas","Getafe"],
    betplay: ["Atlético Nacional","Millonarios","Santa Fe","América de Cali","Junior","Ind. Medellín","Once Caldas","Deportes Tolima","Deportivo Cali","Pereira","Bucaramanga","La Equidad","Águilas Doradas","Envigado","Alianza","Pasto","Patriotas","Fortaleza","Jaguares","Boyacá Chicó"],
    seriea: ["Inter","Milan","Juventus","Napoli","Roma","Lazio","Atalanta","Fiorentina","Bologna","Torino","Udinese","Monza","Lecce","Empoli","Cagliari","Genoa","Verona","Como","Parma","Venezia"],
    bundesliga: ["Bayern Munich","Borussia Dortmund","RB Leipzig","Bayer Leverkusen","Wolfsburg","Eintracht Frankfurt","Stuttgart","Freiburg"],
    ligue1: ["PSG","Monaco","Marseille","Lille","Nice","Lyon","Lens","Reims","Rennes","Strasbourg","Brest","Le Havre","Montpellier","Angers","Nantes","Auxerre","St-Etienne"],
    mls: ["Inter Miami","LAFC","LA Galaxy","Columbus Crew","Cincinnati","Seattle Sounders","Real Salt Lake","Orlando City","NY Red Bulls","Portland Timbers","Houston Dynamo","Minnesota Utd","Vancouver","Charlotte FC"]
};

const ligaSelect = document.getElementById("liga");
const localSelect = document.getElementById("local");
const visitanteSelect = document.getElementById("visitante");

ligaSelect.addEventListener("change", function() {
    const liga = this.value; 
    localSelect.innerHTML = ""; 
    visitanteSelect.innerHTML = "";
    if (!ligas[liga]) return;
    ligas[liga].forEach(eq => {
        localSelect.add(new Option(eq, eq));
        visitanteSelect.add(new Option(eq, eq));
    });
});

function calcular() {
    const loc = localSelect.value; 
    const vis = visitanteSelect.value;
    if (!loc || !vis || loc === vis) return;

    const sL = statsEquipos[loc] || statsEquipos["default"];
    const sV = statsEquipos[vis] || statsEquipos["default"];

    let expL = (sL.atk * sV.def * 1.15);
    let expV = (sV.atk * sL.def);
    let total = expL + expV + 1.2; 
    
    let pL = ((expL / total) * 100).toFixed(1);
    let pV = ((expV / total) * 100).toFixed(1);
    let pE = (100 - pL - pV).toFixed(1);

    let gTotales = expL + expV;
    let p25 = Math.min(90, (gTotales * 25)).toFixed(1);

    document.getElementById("contenedor-resultado").innerHTML = `
        <div class="resultado">
            <div class="header-text">
                <div class="team-display">
                    <span class="team-label">LOCAL</span>
                    <span class="team-name">${loc}</span>
                </div>
                <div class="vs-circle">VS</div>
                <div class="team-display">
                    <span class="team-label">VISITA</span>
                    <span class="team-name">${vis}</span>
                </div>
            </div>

            <div class="prob-row">
                <div class="prob-info"><span>Victoria Local</span><strong>${pL}%</strong></div>
                <div class="bar-bg"><div id="b1" class="bar-fill" style="width:0%; background:#22c55e;"></div></div>
            </div>
            <div class="prob-row">
                <div class="prob-info"><span>Empate</span><strong>${pE}%</strong></div>
                <div class="bar-bg"><div id="b2" class="bar-fill" style="width:0%; background:#64748b;"></div></div>
            </div>
            <div class="prob-row">
                <div class="prob-info"><span>Victoria Visita</span><strong>${pV}%</strong></div>
                <div class="bar-bg"><div id="b3" class="bar-fill" style="width:0%; background:#ef4444;"></div></div>
            </div>

            <div class="grid-stats">
                <div class="card-mini"><small>Ambos Marcan</small><div>${(expL>0.9&&expV>0.9)?'SÍ':'NO'}</div></div>
                <div class="card-mini"><small>Goles +2.5</small><div>${p25}%</div></div>
                <div class="card-mini"><small>Córners Est.</small><div>${Math.floor(7+(gTotales*1.5))}</div></div>
                <div class="card-mini"><small>Goles +1.5</small><div>${Math.min(99, (gTotales*40)).toFixed(1)}%</div></div>
            </div>

            <div class="tip-box">
                <div class="tip-title">RECOMENDACIÓN</div>
                <div class="tip-text">${pL > 50 ? 'Gana ' + loc : pV > 50 ? 'Gana ' + vis : 'Doble Oportunidad'}</div>
            </div>
        </div>
    `;

    setTimeout(() => {
        document.getElementById("b1").style.width = pL + "%";
        document.getElementById("b2").style.width = pE + "%";
        document.getElementById("b3").style.width = pV + "%";
    }, 100);

    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
