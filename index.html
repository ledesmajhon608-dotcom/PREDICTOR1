<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor ELITE Pro</title>
    <style>
        :root{ --bg:#020617; --card:#1e293b; --accent:#10b981; --border:#334155; --text:#f8fafc; --dim:#94a3b8; }
        body{ font-family:sans-serif; background:var(--bg); color:var(--text); padding:10px; display:flex; flex-direction:column; align-items:center; }
        .container{ width:100%; max-width:450px; }
        h1{ color:var(--accent); text-align:center; font-size:24px; }
        .card{ background:var(--card); padding:20px; border-radius:16px; border:1px solid var(--border); margin-bottom:15px; }
        label{ font-size:11px; color:var(--accent); font-weight:bold; display:block; margin:10px 0 5px; }
        select{ width:100%; padding:12px; border-radius:8px; background:#0f172a; color:white; border:1px solid var(--border); }
        button{ width:100%; padding:16px; border:none; border-radius:12px; background:linear-gradient(135deg,#10b981,#059669); color:white; font-weight:800; cursor:pointer; margin-top:10px; }
        .res-card{ background:var(--card); border-radius:16px; border:1px solid var(--accent); padding:20px; margin-top:20px; }
        .prob-bar-container{ margin:15px 0; }
        .bar-bg{ background:#0f172a; height:8px; border-radius:4px; overflow:hidden; }
        .bar-fill{ height:100%; transition:width 1s ease-out; }
        .recommendation{ margin-top:15px; background:rgba(16,185,129,0.1); border:1px dashed var(--accent); padding:15px; border-radius:8px; text-align:center; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ Predictor ELITE</h1>
    <div class="card">
        <label>Competición</label>
        <select id="liga">
            <option value="">Seleccione Liga</option>
            <option value="39">Premier League</option>
            <option value="140">La Liga</option>
            <option value="135">Serie A</option>
            <option value="78">Bundesliga</option>
            <option value="239">Liga BetPlay</option>
        </select>
        <label>Equipo Local</label>
        <select id="local"></select>
        <label>Equipo Visitante</label>
        <select id="visitante"></select>
        <button onclick="calcular()">ANALIZAR PARTIDO</button>
    </div>
    <div id="resultado"></div>
</div>

<script>
const KEY = "ea232d851cb4197391464e2c61df516b"; 
let db = {};

document.getElementById("liga").onchange = async function() {
    const liga = this.value;
    if(!liga) return;
    const seasons = [2026, 2025, 2024];
    for(let s of seasons) {
        try {
            const res = await fetch(`https://v3.football.api-sports.io{liga}&season=${s}`, {
                headers: { "x-rapidapi-key": KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
            });
            const data = await res.json();
            if(data.response.length > 0) {
                const standings = data.response[0].league.standings[0];
                cargarEquipos(standings);
                break;
            }
        } catch(e) { console.log("Error en temporada", s); }
    }
};

function cargarEquipos(standings) {
    db = {};
    const loc = document.getElementById("local");
    const vis = document.getElementById("visitante");
    loc.innerHTML = vis.innerHTML = "";
    standings.forEach(t => {
        const pj = t.all.played || 1;
        db[t.team.name] = {
            atk: t.all.goals.for / pj,
            def: t.all.goals.against / pj,
            form: (t.all.win * 3 + t.all.draw) / (pj * 3)
        };
        loc.add(new Option(t.team.name, t.team.name));
        vis.add(new Option(t.team.name, t.team.name));
    });
}

function poisson(lambda, k) {
    let fact = 1;
    for(let i=1; i<=k; i++) fact *= i;
    return (Math.exp(-lambda) * Math.pow(lambda, k)) / fact;
}

function calcular() {
    const lName = document.getElementById("local").value;
    const vName = document.getElementById("visitante").value;
    if(!db[lName] || lName === vName) return;

    const L = db[lName]; const V = db[vName];
    let expL = (L.atk * V.def * 1.25) + (L.form * 0.3);
    let expV = (V.atk * L.def * 0.85) + (V.form * 0.2);

    let pL = 0, pE = 0, pV = 0;
    for(let i=0; i<6; i++) {
        for(let j=0; j<6; j++) {
            const prob = poisson(expL, i) * poisson(expV, j);
            if(i > j) pL += prob; else if(i === j) pE += prob; else pV += prob;
        }
    }

    const total = pL + pE + pV;
    const resL = (pL/total*100).toFixed(1);
    const resE = (pE/total*100).toFixed(1);
    const resV = (pV/total*100).toFixed(1);

    document.getElementById("resultado").innerHTML = `
        <div class="res-card">
            <b>${lName} vs ${vName}</b>
            <div class="prob-bar-container">
                Local: ${resL}% <div class="bar-bg"><div class="bar-fill" style="width:${resL}%; background:#10b981"></div></div>
                Empate: ${resE}% <div class="bar-bg"><div class="bar-fill" style="width:${resE}%; background:#64748b"></div></div>
                Visitante: ${resV}% <div class="bar-bg"><div class="bar-fill" style="width:${resV}%; background:#ef4444"></div></div>
            </div>
            <div class="recommendation"><b>Pick: ${parseFloat(resL) > 50 ? 'Gana Local' : 'Doble Oportunidad'}</b></div>
        </div>`;
}
</script>
</body>
</html>
