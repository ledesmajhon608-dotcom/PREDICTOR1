<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor PRO Ultra v2.0</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #22c55e;
            --border: #334155;
            --text: #f8fafc;
            --dim: #94a3b8;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; }
        h1 { color: var(--accent); text-align: center; margin-bottom: 5px; font-size: 24px; }
        .subtitle { color: var(--dim); font-size: 12px; text-align: center; margin-bottom: 25px; }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
        }

        label { font-size: 10px; color: var(--accent); font-weight: 800; letter-spacing: 1px; display: block; margin-top: 15px; }
        select {
            width: 100%; padding: 14px; border-radius: 12px; background: #0f172a;
            color: white; border: 1px solid var(--border); margin-top: 5px; cursor: pointer;
        }

        button {
            margin-top: 20px; width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, #22c55e, #15803d);
            color: white; font-weight: bold; font-size: 16px; cursor: pointer;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.98); }

        .resultado-box { margin-top: 30px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .team-name { font-weight: 800; font-size: 16px; width: 40%; text-align: center; }
        .vs-badge { background: var(--accent); color: #000; padding: 4px 8px; border-radius: 6px; font-weight: 900; font-size: 12px; }

        .prob-bar-container { margin-bottom: 15px; }
        .prob-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
        .bar-bg { background: #0f172a; height: 12px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
        .bar-fill { height: 100%; transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .stat-card { background: #0f172a; padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-val { display: block; font-size: 18px; font-weight: 800; color: var(--accent); margin: 5px 0; }
        .stat-label { font-size: 11px; color: var(--dim); text-transform: uppercase; }

        .recommendation {
            margin-top: 25px; background: rgba(34, 197, 94, 0.15); border: 2px dashed var(--accent);
            padding: 20px; border-radius: 18px; text-align: center;
        }
        .rec-tag { color: var(--accent); font-weight: 900; font-size: 20px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Predictor ELITE AI</h1>
    <div class="subtitle">Algoritmo Poisson Ajustado por Localía y Defensa</div>

    <div class="card">
        <label>COMPETICIÓN</label>
        <select id="liga">
            <option value="">Seleccionar Liga...</option>
            <option value="39">Premier League (Inglaterra)</option>
            <option value="140">La Liga (España)</option>
            <option value="135">Serie A (Italia)</option>
            <option value="78">Bundesliga (Alemania)</option>
            <option value="61">Ligue 1 (Francia)</option>
            <option value="253">MLS (USA)</option>
            <option value="71">Brasileirão (Brasil)</option>
            <option value="128">Liga Argentina</option>
            <option value="239">Liga BetPlay (Colombia)</option>
        </select>

        <label>EQUIPO LOCAL</label>
        <select id="local"><option>Esperando liga...</option></select>

        <label>EQUIPO VISITANTE</label>
        <select id="visitante"><option>Esperando liga...</option></select>

        <button onclick="generarPrediccion()">ANALIZAR PARTIDO</button>
    </div>

    <div id="resultado"></div>
</div>

<script>
const API_URL = "https://v3.football.api-sports.io/standings";
const API_KEY = "ea232d851cb4197391464e2c61df516b"; // Tu llave actual

let dbEquipos = {};

// Carga de datos mejorada
document.getElementById("liga").onchange = async function() {
    const ligaId = this.value;
    if(!ligaId) return;

    try {
        const response = await fetch(`${API_URL}?league=${ligaId}&season=2024`2025`, {
            headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
        });
        const data = await response.json();
        const standings = data.response[0].league.standings[0];
        procesarEquipos(standings);
    } catch (e) { alert("Error cargando datos. Verifica tu conexión."); }
};

function procesarEquipos(data) {
    dbEquipos = {};
    const selectL = document.getElementById("local");
    const selectV = document.getElementById("visitante");
    selectL.innerHTML = ""; selectV.innerHTML = "";

    data.forEach(t => {
        const n = t.team.name;
        // Guardamos stats específicas de Casa y Fuera para mayor precisión
        dbEquipos[n] = {
            hAtk: t.home.goals.for / (t.home.played || 1),
            hDef: t.home.goals.against / (t.home.played || 1),
            aAtk: t.away.goals.for / (t.away.played || 1),
            aDef: t.away.goals.against / (t.away.played || 1),
            points: t.points,
            rank: t.rank,
            form: t.form ? t.form.slice(-5) : "WWDDD"
        };
        selectL.add(new Option(n, n));
        selectV.add(new Option(n, n));
    });
}

function poisson(lambda, k) {
    let fact = 1;
    for(let i=1; i<=k; i++) fact *= i;
    return (Math.pow(lambda, k) * Math.exp(-lambda)) / fact;
}

function generarPrediccion() {
    const lName = document.getElementById("local").value;
    const vName = document.getElementById("visitante").value;
    
    if(lName === vName) return alert("Selecciona equipos distintos");

    const L = dbEquipos[lName];
    const V = dbEquipos[vName];

    // CÁLCULO DE GOLES ESPERADOS (xG) mejorado
    // El local ataca contra la defensa visitante fuera, y viceversa
    let expL = (L.hAtk * V.aDef * 1.12); // 1.12 es el bono de localía estándar
    let expV = (V.aAtk * L.hDef * 0.90); // 0.90 factor de dificultad visitante

    // Factor de forma (últimos 5 partidos)
    const calcularForma = (f) => (f.split('W').length - 1) * 0.15;
    expL += calcularForma(L.form);
    expV += calcularForma(V.form);

    // Probabilidades 1X2 usando matriz de Poisson simplificada
    const pL0 = poisson(expL, 0); const pL1 = poisson(expL, 1); const pL2 = poisson(expL, 2);
    const pV0 = poisson(expV, 0); const pV1 = poisson(expV, 1); const pV2 = poisson(expV, 2);

    // Probabilidad de Empate (Suma de 0-0, 1-1, 2-2)
    let probE = ((pL0 * pV0) + (pL1 * pV1) + (pL2 * pV2)) * 100;
    
    // Probabilidad de Victoria (Basada en fuerza relativa)
    let totalPower = expL + expV;
    let probL = (expL / totalPower) * (100 - probE);
    let probV = (expV / totalPower) * (100 - probE);

    // Mercados Secundarios
    const over25 = (1 - (pL0*pV0 + pL0*pV1 + pL1*pV0)) * 100;
    const ambosMarcan = (1 - pL0) * (1 - pV0) * 100;

    // Lógica de recomendación de BAJO RIESGO
    let rec = "";
    let colorRec = "var(--accent)";

    if (probL > 55) rec = `Gana ${lName} (DNB)`; 
    else if (probV > 55) rec = `Gana ${vName} (DNB)`;
    else if (ambosMarcan > 65) rec = "Ambos Marcan (BTTS)";
    else if (over25 > 60) rec = "Over 1.5 Goles";
    else rec = "Doble Oportunidad Local";

    document.getElementById("resultado").innerHTML = `
        <div class="resultado-box">
            <div class="card">
                <div class="match-header">
                    <div class="team-name">${lName}</div>
                    <div class="vs-badge">VS</div>
                    <div class="team-name">${vName}</div>
                </div>

                <div class="prob-bar-container">
                    <div class="prob-label"><span>Victoria Local</span> <b>${probL.toFixed(1)}%</b></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${probL}%; background:var(--accent)"></div></div>
                </div>

                <div class="prob-bar-container">
                    <div class="prob-label"><span>Empate</span> <b>${probE.toFixed(1)}%</b></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${probE}%; background:var(--dim)"></div></div>
                </div>

                <div class="prob-bar-container">
                    <div class="prob-label"><span>Victoria Visitante</span> <b>${probV.toFixed(1)}%</b></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${probV}%; background:var(--danger)"></div></div>
                </div>

                <div class="grid-stats">
                    <div class="stat-card">
                        <span class="stat-label">Ambos Marcan</span>
                        <span class="stat-val">${ambosMarcan.toFixed(0)}%</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Más de 2.5</span>
                        <span class="stat-val">${over25.toFixed(0)}%</span>
                    </div>
                </div>

                <div class="recommendation">
                    <span style="font-size:11px; font-weight:bold; color:var(--dim)">ESTRATEGIA RECOMENDADA</span>
                    <span class="rec-tag">${rec}</span>
                </div>
            </div>
        </div>
    `;
}
</script>
</body>
</html>
