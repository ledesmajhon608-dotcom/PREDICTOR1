<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor ELITE v4.5</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #22c55e;
            --border: #334155;
            --text: #f8fafc;
            --dim: #94a3b8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items:center;
            margin: 0;
        }

        .container { width: 100%; max-width: 480px; }
        h1 { color: var(--accent); text-align: center; margin: 10px 0 5px 0; font-size: 22px; }
        .subtitle { color: var(--dim); font-size: 11px; text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        .selector-card {
            background: var(--card); padding: 20px; border-radius: 20px;
            border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        label { font-size: 10px; color: var(--accent); font-weight: 800; display: block; margin-top: 12px; }
        select { width: 100%; padding: 12px; border-radius: 10px; background: #020617; color: white; border: 1px solid var(--border); margin-top: 5px; font-size: 14px; }
        button { margin-top: 20px; width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        .season-badge { background: var(--border); color: var(--text); padding: 4px 10px; border-radius: 20px; font-size: 10px; display: inline-block; margin-top: 10px; }

        .resultado-container { margin-top: 25px; animation: slideUp 0.4s ease; display: none; width: 100%; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .match-box { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--border); }
        .teams-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .team-display { width: 42%; text-align: center; font-weight: bold; font-size: 15px; }
        .vs-circle { background: var(--bg); border: 1px solid var(--accent); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; }

        .prob-row { margin-bottom: 12px; }
        .prob-info { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
        .bar-outer { background: #020617; height: 10px; border-radius: 10px; overflow: hidden; }
        .bar-inner { height: 100%; transition: width 1s ease-out; }

        /* Rejilla de Tarjetas (Boxes) */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-card { background: #020617; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .stat-card span { font-size: 9px; color: var(--dim); text-transform: uppercase; display: block; margin-bottom: 5px; letter-spacing: 0.5px; }
        .stat-card b { font-size: 18px; display: block; }
        
        /* Colores específicos para los valores */
        .val-accent { color: var(--accent); }
        .val-warning { color: var(--warning); }
        .val-info { color: var(--info); }

        .bet-tip { margin-top: 20px; background: rgba(34, 197, 94, 0.1); border: 2px dashed var(--accent); padding: 15px; border-radius: 15px; text-align: center; }
        .bet-tip b { color: var(--accent); font-size: 18px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ PREDICTOR ELITE</h1>
    <div class="subtitle">Versión Optimizada v4.5</div>

    <div class="selector-card">
        <label>LIGA PROFESIONAL</label>
        <select id="liga">
            <option value="">Seleccione competición...</option>
            <option value="39">Premier League 🏴󠁧󠁢󠁥󠁮󠁧󠁿</option>
            <option value="140">La Liga 🇪🇸</option>
            <option value="135">Serie A 🇮🇹</option>
            <option value="78">Bundesliga 🇩🇪</option>
            <option value="239">Liga BetPlay 🇨🇴</option>
            <option value="71">Brasileirão 🇧🇷</option>
            <option value="253">MLS 🇺🇸</option>
        </select>
        <div id="statusSeason" class="season-badge" style="display:none"></div>
        <label>LOCAL</label><select id="local"></select>
        <label>VISITANTE</label><select id="visitante"></select>
        <button onclick="calcularTodo()">CALCULAR PREDICCIÓN</button>
    </div>

    <div id="resultado" class="resultado-container">
        <div class="match-box">
            <div class="teams-header">
                <div id="lNameDisplay" class="team-display"></div>
                <div class="vs-circle">VS</div>
                <div id="vNameDisplay" class="team-display"></div>
            </div>

            <div class="prob-row"><div class="prob-info"><span>Victoria Local</span> <b id="probLVal">0%</b></div><div class="bar-outer"><div id="barLFill" class="bar-inner" style="background:var(--accent)"></div></div></div>
            <div class="prob-row"><div class="prob-info"><span>Empate</span> <b id="probEVal">0%</b></div><div class="bar-outer"><div id="barEFill" class="bar-inner" style="background:var(--dim)"></div></div></div>
            <div class="prob-row"><div class="prob-info"><span>Victoria Visitante</span> <b id="probVVal">0%</b></div><div class="bar-outer"><div id="barVFill" class="bar-inner" style="background:var(--danger)"></div></div></div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span>Ambos Marcan</span>
                    <b id="probAmbosVal" class="val-accent">0%</b>
                </div>
                <div class="stat-card">
                    <span>Más de 1.5 Goles</span>
                    <b id="probOver15Val" class="val-accent">0%</b>
                </div>
                <div class="stat-card">
                    <span>Más de 2.5 Goles</span>
                    <b id="probOver25Val" class="val-warning">0%</b>
                </div>
                <div class="stat-card">
                    <span>Más de 7.5 Corners</span>
                    <b id="probCornersVal" class="val-info">0%</b>
                </div>
            </div>

            <div class="bet-tip">
                <span>ESTRATEGIA RECOMENDADA</span>
                <b id="recText"></b>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "ea232d851cb4197391464e2c61df516b";
    const API_BASE = "https://v3.football.api-sports.io/standings";
    let baseDatos = {};

    document.getElementById("liga").onchange = async function() {
        const ligaId = this.value; if(!ligaId) return;
        const anios = [2026, 2025, 2024]; let exito = false;
        for(let anio of anios) {
            if(exito) break;
            try {
                const res = await fetch(`${API_BASE}?league=${ligaId}&season=${anio}`, { headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" } });
                const json = await res.json();
                if(json.response && json.response.length > 0) {
                    procesarData(json.response[0].league.standings[0]);
                    document.getElementById("statusSeason").style.display = "inline-block";
                    document.getElementById("statusSeason").innerText = "TEMPORADA: " + anio;
                    exito = true;
                }
            } catch (e) {}
        }
    };

    function procesarData(data) {
        baseDatos = {}; const loc = document.getElementById("local"); const vis = document.getElementById("visitante");
        loc.innerHTML = vis.innerHTML = "";
        data.forEach(t => {
            const n = t.team.name;
            baseDatos[n] = { 
                hAtk: t.home.goals.for / (t.home.played || 1), 
                hDef: t.home.goals.against / (t.home.played || 1), 
                aAtk: t.away.goals.for / (t.away.played || 1), 
                aDef: t.away.goals.against / (t.away.played || 1) 
            };
            loc.add(new Option(n, n)); vis.add(new Option(n, n));
        });
    }

    function poisson(lambda, k) { let fact = 1; for(let i=1; i<=k; i++) fact *= i; return (Math.pow(lambda, k) * Math.exp(-lambda)) / fact; }

    function calcularTodo() {
        const lN = document.getElementById("local").value; const vN = document.getElementById("visitante").value;
        if(lN === vN) return alert("Selecciona equipos diferentes");
        const L = baseDatos[lN]; const V = baseDatos[vN];
        
        let expL = (L.hAtk * V.aDef * 1.15); 
        let expV = (V.aAtk * L.hDef * 0.92);

        const pL0 = poisson(expL, 0); const pL1 = poisson(expL, 1);
        const pV0 = poisson(expV, 0); const pV1 = poisson(expV, 1);

        const probE = ((pL0 * pV0) + (pL1 * pV1) + (poisson(expL,2)*poisson(expV,2))) * 100;
        const totalExp = expL + expV;
        let pLocal = (expL / totalExp) * (100 - probE);
        let pVis = (expV / totalExp) * (100 - probE);

        // Cálculos de tarjetas
        const ambos = (1 - pL0) * (1 - pV0) * 100;
        const over15 = (1 - (pL0 * pV0)) * 100;
        const over25 = (1 - (pL0*pV0 + pL0*pV1 + pL1*pV0)) * 100;
        let probCorners = Math.min(94, Math.max(40, ((expL + expV) * 18) + 15));

        // Actualizar UI
        document.getElementById("lNameDisplay").innerText = lN;
        document.getElementById("vNameDisplay").innerText = vN;
        document.getElementById("probLVal").innerText = pLocal.toFixed(1) + "%";
        document.getElementById("barLFill").style.width = pLocal + "%";
        document.getElementById("probEVal").innerText = probE.toFixed(1) + "%";
        document.getElementById("barEFill").style.width = probE + "%";
        document.getElementById("probVVal").innerText = pVis.toFixed(1) + "%";
        document.getElementById("barVFill").style.width = pVis + "%";

        // Tarjetas inferiores
        document.getElementById("probAmbosVal").innerText = ambos.toFixed(0) + "%";
        document.getElementById("probOver15Val").innerText = over15.toFixed(0) + "%";
        document.getElementById("probOver25Val").innerText = over25.toFixed(0) + "%";
        document.getElementById("probCornersVal").innerText = probCorners.toFixed(0) + "%";

        let tip = pLocal > 55 ? "1X (Local)" : pVis > 55 ? "X2 (Visita)" : "+1.5 Goles";
        document.getElementById("recText").innerText = tip;
        document.getElementById("resultado").style.display = "block";
    }
</script>
</body>
</html>
