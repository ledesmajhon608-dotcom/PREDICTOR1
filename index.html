<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predictor PRO Mobile</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #22c55e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            color: var(--accent); 
            font-size: 28px; 
            margin: 10px 0 5px 0;
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
        }

        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 25px; }

        /* Contenedor de Selección */
        .selector-container {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        label { display: block; text-align: left; font-size: 12px; font-weight: bold; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: #0f172a;
            color: white;
            border: 1px solid var(--border);
            font-size: 16px; /* Evita zoom automático en iPhone */
            margin-bottom: 15px;
            appearance: none;
        }

        .matchup {
            display: grid;
            grid-template-columns: 1fr 40px 1fr;
            align-items: center;
            gap: 10px;
        }

        /* Botón Pro */
        button {
            width: 100%;
            max-width: 400px;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.4);
            cursor: pointer;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.96); }

        /* Resultado Estilo Card */
        .resultado {
            margin-top: 25px;
            background: var(--card);
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            box-sizing: border-box;
            border: 1px solid var(--border);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header-teams {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 25px;
        }

        .team-box { width: 100px; }
        .team-box img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 8px; }
        .team-box span { display: block; font-size: 14px; font-weight: bold; }

        .vs-badge { background: var(--border); padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }

        /* Probabilidades Modernas */
        .prob-row { margin-bottom: 15px; }
        .prob-info { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
        .bar-bg { background: #0f172a; height: 12px; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 10px; transition: width 1s ease-in-out; }

        /* Grid de Stats */
        .grid-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 25px;
        }

        .card-mini {
            background: #0f172a;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .card-mini small { color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
        .card-mini div { font-size: 18px; font-weight: bold; margin-top: 5px; }

        .badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; }
        .bg-win { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .bg-lose { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>

    <h1>⚽ Predictor PRO</h1>
    <div class="subtitle">Análisis Estadístico Avanzado</div>

    <div class="selector-container">
        <label>Competición</label>
        <select id="liga">
            <option value="">Seleccionar Liga</option>
            <option value="premier">Premier League</option>
            <option value="laliga">La Liga</option>
            <option value="betplay">Liga BetPlay</option>
            <option value="seriea">Serie A</option>
            <option value="bundesliga">Bundesliga</option>
        </select>

        <div class="matchup">
            <div>
                <label>Local</label>
                <select id="local"></select>
            </div>
            <div class="vs-badge" style="margin-top: 15px;">VS</div>
            <div>
                <label>Visita</label>
                <select id="visitante"></select>
            </div>
        </div>
    </div>

    <button onclick="calcular()">CALCULAR AHORA</button>

    <div id="contenedor-resultado" style="width: 100%;"></div>

<script>
// (Mantengo tu base de datos y lógica, solo cambio el renderizado visual)
const statsEquipos = {
    "Arsenal": { atk: 2.3, def: 0.8 }, "Manchester City": { atk: 2.5, def: 1.0 }, "Liverpool": { atk: 2.4, def: 0.9 },
    "Real Madrid": { atk: 2.4, def: 0.8 }, "Barcelona": { atk: 2.7, def: 1.1 },
    "Atlético Nacional": { atk: 1.6, def: 1.0 }, "Millonarios": { atk: 1.5, def: 0.9 }, "Santa Fe": { atk: 1.4, def: 0.8 },
    "América de Cali": { atk: 1.5, def: 1.1 }, "Junior": { atk: 1.5, def: 1.2 },
    "default": { atk: 1.2, def: 1.4 }
};

const ligas={
    premier:["Arsenal","Aston Villa","Bournemouth","Brentford","Brighton","Chelsea","Crystal Palace","Everton","Fulham","Ipswich Town","Leicester City","Liverpool","Manchester City","Manchester United","Newcastle United","Nottingham Forest","Southampton","Tottenham","West Ham","Wolves"],
    laliga:["Real Madrid","Barcelona","Atletico Madrid","Athletic Club","Real Sociedad","Villarreal","Real Betis","Valencia","Sevilla","Girona","Osasuna","Celta Vigo","Alaves","Espanyol","Valladolid","Leganes","Rayo Vallecano","Mallorca","Las Palmas","Getafe"],
    betplay:["Atlético Nacional","Millonarios","Santa Fe","América de Cali","Junior","Ind. Medellín","Once Caldas","Deportes Tolima","Deportivo Cali","Pereira","Bucaramanga","La Equidad","Águilas Doradas","Envigado","Alianza","Pasto","Patriotas","Fortaleza","Jaguares","Boyacá Chicó"],
    seriea:["Inter","Milan","Juventus","Napoli","Roma","Lazio","Atalanta","Fiorentina"],
    bundesliga:["Bayern Munich","Borussia Dortmund","RB Leipzig","Bayer Leverkusen"]
}

const logos={
    "Arsenal":"https://crests.football-data.org/57.png","Manchester City":"https://crests.football-data.org/65.png","Real Madrid":"https://crests.football-data.org/86.png","Barcelona":"https://crests.football-data.org/81.png",
    "Atlético Nacional":"https://upload.wikimedia.org/wikipedia/commons/9/9a/Escudo_de_Atl%C3%A9tico_Nacional.png",
    "Millonarios":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Escudo_de_Millonarios_F.C.svg/1200px-Escudo_de_Millonarios_F.C.svg.png",
    "Santa Fe":"https://upload.wikimedia.org/wikipedia/commons/e/e1/Independiente_Santa_Fe_logo.png"
}

const ligaSelect=document.getElementById("liga");
const localSelect=document.getElementById("local");
const visitanteSelect=document.getElementById("visitante");

ligaSelect.addEventListener("change",function(){
    const liga=this.value; localSelect.innerHTML=""; visitanteSelect.innerHTML="";
    if(!ligas[liga]) return;
    ligas[liga].forEach(eq=>{
        localSelect.add(new Option(eq, eq));
        visitanteSelect.add(new Option(eq, eq));
    });
});

function calcular(){
    const loc=localSelect.value; const vis=visitanteSelect.value;
    if(!loc || !vis || loc === vis) return;

    const sL = statsEquipos[loc] || statsEquipos["default"];
    const sV = statsEquipos[vis] || statsEquipos["default"];

    let expL = (sL.atk * sV.def * 1.15);
    let expV = (sV.atk * sL.def);
    let total = expL + expV + 1.2; 
    
    let pL = ((expL / total) * 100).toFixed(1);
    let pV = ((expV / total) * 100).toFixed(1);
    let pE = (100 - pL - pV).toFixed(1);

    let golesTotales = expL + expV;
    let p15 = Math.min(99, (golesTotales * 40)).toFixed(1);
    let p25 = Math.min(90, (golesTotales * 25)).toFixed(1);

    const imgDef = 'https://upload.wikimedia.org/wikipedia/commons/6/6e/Soccer_ball.svg';

    document.getElementById("contenedor-resultado").innerHTML = `
        <div class="resultado">
            <div class="header-teams">
                <div class="team-box"><img src="${logos[loc]||imgDef}"><span>${loc}</span></div>
                <div class="vs-badge">VS</div>
                <div class="team-box"><img src="${logos[vis]||imgDef}"><span>${vis}</span></div>
            </div>

            <div class="prob-row">
                <div class="prob-info"><span>Victoria Local</span><strong>${pL}%</strong></div>
                <div class="bar-bg"><div id="b1" class="bar-fill" style="width:0%; background:#22c55e;"></div></div>
            </div>
            <div class="prob-row">
                <div class="prob-info"><span>Empate</span><strong>${pE}%</strong></div>
                <div class="bar-bg"><div id="b2" class="bar-fill" style="width:0%; background:#64748b;"></div></div>
            </div>
            <div class="prob-row">
                <div class="prob-info"><span>Victoria Visita</span><strong>${pV}%</strong></div>
                <div class="bar-bg"><div id="b3" class="bar-fill" style="width:0%; background:#ef4444;"></div></div>
            </div>

            <div class="grid-stats">
                <div class="card-mini"><small>Ambos Marcan</small><div style="color:${(expL>0.9&&expV>0.9)?'#22c55e':'#ef4444'}">${(expL>0.9&&expV>0.9)?'SÍ':'NO'}</div></div>
                <div class="card-mini"><small>Córners Est.</small><div>${Math.floor(7+(golesTotales*1.5))}</div></div>
                <div class="card-mini"><small>Goles +1.5</small><div style="color:#eab308">${p15}%</div></div>
                <div class="card-mini"><small>Goles +2.5</small><div style="color:#eab308">${p25}%</div></div>
            </div>
        </div>
    `;

    setTimeout(() => {
        document.getElementById("b1").style.width = pL + "%";
        document.getElementById("b2").style.width = pE + "%";
        document.getElementById("b3").style.width = pV + "%";
    }, 100);
    
    // Scroll suave al resultado en móviles
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
